    ['לחם','פרוסה',30],['פיתה','יחידה',80],['פיתה כוסמין','יחידה',75],['בננה','יחידה בינונית',120],['תמר מג׳הול','יחידה',24],
    ['טחינה','כף',15],['טחינה','כפית',5],['חמאת בוטנים','כף',15],['חמאת בוטנים','כפית',5],
    ['שמן זית','כף',10],['שמן זית','כפית',5],['אבוקדו','חצי אבוקדו',100],
    ['שקדים','יחידה',1.2],['אגוז מלך','יחידה',5],['קשיו','יחידה',1.5],['פיסטוק','יחידה',0.6],
  ];
  const FOOD_UNITS_MAP = {};
  for (const [food, unit, grams] of FOOD_UNITS_RAW) {
    if (!FOOD_UNITS_MAP[food]) FOOD_UNITS_MAP[food] = [];
    FOOD_UNITS_MAP[food].push({ name: unit, grams });
  }
  const GENERIC_UNITS = [
    { name:'גרם',grams:1 },{ name:'כף',grams:15 },{ name:'כפית',grams:5 },
    { name:'כוס',grams:240 },{ name:'יחידה',grams:100 },{ name:'פרוסה',grams:30 },{ name:'חצי',grams:50 },
  ];
  function getUnitsForFood(foodName) {
    const specific = FOOD_UNITS_MAP[foodName] || [];
    if (!specific.length) return GENERIC_UNITS;
    return specific.some(u => u.name === 'גרם') ? specific : [{ name:'גרם',grams:1 }, ...specific];
  }
  function toggleItemExpand(mi, ii) {
    const item = nutritionPlan[mi].items[ii];
    item._exp = !item._exp;
    if (!item._unit) item._unit = 'גרם';
    if (item._qty == null) item._qty = parseFloat(item.quantity) || 100;
    renderNutritionEditor();
  }
  function setItemUnit(mi, ii, unitName) {
    const item = nutritionPlan[mi].items[ii];
    item._unit = unitName; item._qty = unitName === 'גרם' ? 100 : 1;
    recalcItemMacros(mi, ii); renderNutritionEditor();
  }
  function setItemQty(mi, ii, qty) {
    nutritionPlan[mi].items[ii]._qty = qty;
    recalcItemMacros(mi, ii); renderNutritionEditor();
  }
  function recalcItemMacros(mi, ii) {
    const item = nutritionPlan[mi].items[ii];
    const food = allFoodItems.find(f => f.name === item.food);
    if (!food) return;
    const units = getUnitsForFood(item.food);
    const unit  = units.find(u => u.name === item._unit) || { grams: 1 };
    const grams = (item._qty || 1) * unit.grams;
    const r = grams / 100;
    item.calories = Math.round(food.calories * r * 10) / 10;
    item.protein  = Math.round(food.protein  * r * 10) / 10;
    item.carbs    = Math.round(food.carbs    * r * 10) / 10;
    item.fat      = Math.round(food.fat      * r * 10) / 10;
    item.quantity = item._unit === 'גרם' ? `${Math.round(grams)} גרם` : `${item._qty} ${item._unit} (${Math.round(grams)}g)`;
  }

  /* ── EXERCISE AUTOCOMPLETE ── */
  async function loadExerciseLibrary() {
    const { data } = await sb.from('exercises').select('id,name,muscle_group,sub_muscle_group').order('name');
    exerciseLibrary = data || [];
  }
  async function loadFoodItems() {
    const { data } = await sb.from('food_items').select('*').order('name');
    allFoodItems = data || [];
  }
  function showExSugg(input, di, ei) {
    hideExSugg();
    trainingPlan[di].exercises[ei].name = input.value;
    const q = input.value.trim().toLowerCase();
    if (!q) return;
    const matches = exerciseLibrary.filter(e => e.name.toLowerCase().includes(q)).slice(0,8);
    if (!matches.length) return;
    const rect = input.getBoundingClientRect();
    const drop = document.createElement('div');
    drop.id = 'ex-sugg-drop';
    drop.style.cssText=`position:fixed;top:${rect.bottom+2}px;right:${window.innerWidth-rect.right}px;width:${rect.width}px;background:#1e1e1e;border:1px solid rgba(255,107,0,0.4);border-radius:8px;z-index:500;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,0.6);`;
    matches.forEach(ex => {
      const item = document.createElement('div');
      item.style.cssText='padding:9px 12px;cursor:pointer;font-size:0.85rem;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center;';
      const lbl = ex.sub_muscle_group?`${ex.muscle_group} › ${ex.sub_muscle_group}`:ex.muscle_group;
      item.innerHTML=`<span>${hlMatch(ex.name,q)}</span><span style="font-size:0.72rem;color:var(--muted);">${lbl}</span>`;
      item.onmousedown=()=>{ trainingPlan[di].exercises[ei].name=ex.name; input.value=ex.name; hideExSugg(); };
      item.onmouseover=()=>item.style.background='rgba(255,107,0,0.1)';
      item.onmouseout=()=>item.style.background='';
      drop.appendChild(item);
    });
    document.body.appendChild(drop);
  }
  function hideExSugg() { const d=document.getElementById('ex-sugg-drop'); if(d) d.remove(); }
  function hlMatch(name,q) {
    const idx=name.toLowerCase().indexOf(q);
    if(idx===-1) return esc(name);
    return esc(name.slice(0,idx))+`<span style="color:var(--orange);font-weight:700;">${esc(name.slice(idx,idx+q.length))}</span>`+esc(name.slice(idx+q.length));
  }
  function showFoodSuggCoach(input, mi, ii) {
    hideFoodSuggCoach();
    const q = input.value.trim();
    if(!q || !allFoodItems.length) return;
    const matches = allFoodItems.filter(f=>f.name.includes(q)).slice(0,8);
    if(!matches.length) return;
    const rect=input.getBoundingClientRect();
    const drop=document.createElement('div');
    drop.id='food-sugg-coach';
    drop.style.cssText=`position:fixed;top:${rect.bottom+2}px;right:${window.innerWidth-rect.right}px;min-width:${rect.width+180}px;background:#1e1e1e;border:1px solid rgba(255,107,0,0.4);border-radius:8px;z-index:600;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,0.7);`;
    matches.forEach(f=>{
      const item=document.createElement('div');
      item.style.cssText='padding:9px 12px;cursor:pointer;font-size:0.85rem;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center;gap:12px;';
      item.innerHTML=`<span style="font-weight:600;">${esc(f.name)}</span><span style="font-size:0.72rem;color:#888;white-space:nowrap;">${f.calories}קק"ל | P${f.protein}g C${f.carbs}g F${f.fat}g</span>`;
      item.onmousedown=()=>{
        nutritionPlan[mi].items[ii].food=f.name; nutritionPlan[mi].items[ii].calories=f.calories;
        nutritionPlan[mi].items[ii].protein=f.protein; nutritionPlan[mi].items[ii].carbs=f.carbs;
        nutritionPlan[mi].items[ii].fat=f.fat;
        if(!nutritionPlan[mi].items[ii].quantity) nutritionPlan[mi].items[ii].quantity='100 גרם';
        hideFoodSuggCoach(); renderNutritionEditor();
      };
      item.onmouseover=()=>item.style.background='rgba(255,107,0,0.1)';
      item.onmouseout=()=>item.style.background='';
      drop.appendChild(item);
    });
    document.body.appendChild(drop);
  }
  function hideFoodSuggCoach() { const d=document.getElementById('food-sugg-coach'); if(d) d.remove(); }

  document.addEventListener('click', e => {
    const d1=document.getElementById('ex-sugg-drop'); if(d1&&!d1.contains(e.target)) hideExSugg();
    const d2=document.getElementById('food-sugg-coach'); if(d2&&!d2.contains(e.target)) hideFoodSuggCoach();
  });

  /* ── WORKOUT LOGS ── */
  async function loadClientLogs(email) {
    const el=document.getElementById('client-logs-wrap'); if(!el) return;
    const { data } = await sb.from('workout_logs').select('*').eq('client_email',email).order('log_date',{ascending:false}).limit(30);
    if(!el) return;
    if(!(data||[]).length){ el.innerHTML='<div style="color:#444;font-size:0.85rem;">המתאמן עדיין לא תיעד אימונים</div>'; return; }
    el.innerHTML=(data||[]).map(log=>{
      const d=new Date(log.log_date+'T12:00:00');
      const ds=d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});
      return `<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;margin-bottom:6px;overflow:hidden;">
        <div style="padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block'">
          <div><div style="font-size:0.88rem;font-weight:700;">${ds}</div><div style="font-size:0.78rem;color:var(--orange);margin-top:2px;">${esc(log.day_name)}</div></div>
          <span style="color:var(--orange);font-size:0.75rem;">▼</span>
        </div>
        <div style="display:none;padding:0 14px 12px;">
          ${(log.exercises||[]).map(ex=>`
            <div style="padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
              <div style="font-size:0.82rem;font-weight:700;color:var(--gold);margin-bottom:3px;">${esc(ex.name)}</div>
              <div style="font-size:0.8rem;color:var(--muted);">${(ex.sets||[]).map((s,i)=>`סט ${i+1}: <span style="color:#fff">${s.weight||'—'} ק"ג × ${s.reps||'—'}</span>`).join(' &nbsp;|&nbsp; ')}</div>
            </div>`).join('')}
          ${log.notes?`<div style="margin-top:8px;font-size:0.8rem;color:var(--muted);">📝 ${esc(log.notes)}</div>`:''}
        </div>
      </div>`;
    }).join('');
  }

  /* ── RECORDS ── */
  const RECORD_EXERCISES = {
    'חזה':['לחיצת חזה במשקולות','לחיצת חזה במוט חופשי','לחיצת חזה בסמית','לחיצת חזה בשיפוע חיובי במוט חופשי','לחיצת חזה בשיפוע חיובי בסמית','לחיצת חזה בשיפוע חיובי במשקולות'],
    'רגליים':['סקוואט חופשי','סקוואט בסמית','דדליפט קונבנציונלי','דדליפט רומני','היפ טראסט'],
    'גב':['פולי עליון לגב','חתירה במוט חופשי','חתירה בסמית'],
    'יד קדמית':['יד קדמית במוט','יד קדמית בדאמבלים'],
    'יד אחורית':['לחיצה צרה במוט','לחיצה צרה בסמית'],
    'כתפיים':['לחיצת כתפיים במוט חופשי','לחיצת כתפיים בסמית','לחיצת כתפיים בדאמבלים'],
  };
  const MEDALS=['🥇','🥈','🥉'];
  let recMode='strength', recMuscle='חזה', recExercise='לחיצת חזה במוט חופשי';
  let recLogs=null, recClients={}, recSteps=[];

  function calc1RM(w,r){ w=parseFloat(w);r=parseInt(r); if(!w||!r||r<=0) return 0; return Math.round(w*(1+r/30)*10)/10; }

  async function openRecords() {
    document.getElementById('records-overlay').classList.add('open');
    document.body.style.overflow='hidden';
    if(recLogs!==null){ renderRecBody(); return; }
    document.getElementById('rec-body').innerHTML='<div style="text-align:center;padding:40px;color:#444;">טוען נתונים...</div>';
    const clientEmails = clients.map(c=>c.email);
    if(!clientEmails.length){ recLogs=[]; recSteps=[]; renderRecBody(); return; }
    const today=new Date().toISOString().split('T')[0];
    const [{ data: logs },{ data: steps }] = await Promise.all([
      sb.from('workout_logs').select('client_email,log_date,exercises').in('client_email',clientEmails),
      sb.from('steps_logs').select('client_email,steps').eq('log_date',today).in('client_email',clientEmails)
    ]);
    recLogs=logs||[]; recSteps=steps||[];
    clients.forEach(c=>{ recClients[c.email]=c.name||c.email.split('@')[0]; });
    renderRecBody();
  }

  function closeRecords() { document.getElementById('records-overlay').classList.remove('open'); document.body.style.overflow=''; }

  function renderRecBody() {
    const body=document.getElementById('rec-body');
    const modeTabs=`<div class="rec-mode-tabs">
      <button class="rec-tab${recMode==='strength'?' active':''}" onclick="setRecMode('strength')">💪 שיאי כוח</button>
      <button class="rec-tab${recMode==='steps'?' active':''}" onclick="setRecMode('steps')">🚶 צעדים יומיים</button>
    </div>`;
    if(recMode==='steps'){
      const today=new Date().toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});
      const myS=recSteps.find(s=>s.client_email===coachEmail);
      const top=[...recSteps].sort((a,b)=>b.steps-a.steps).slice(0,10);
      body.innerHTML=modeTabs+`
        <div style="font-size:0.8rem;color:var(--muted);margin-bottom:14px;">📅 היום — ${today}</div>
        <div class="steps-row">
          <input class="steps-input" type="number" id="steps-inp" min="0" placeholder="כמה צעדים עשית היום?" value="${myS?myS.steps:''}"/>
          <button class="btn-save-steps" onclick="logSteps()">שמור</button>
        </div>
        ${top.length?`<div class="podium">${top.map((s,i)=>`
          <div class="podium-row${i<3?' rank-'+(i+1):''}">
            <div class="podium-medal">${i<3?MEDALS[i]:'#'+(i+1)}</div>
            <div class="podium-info"><div class="podium-name">${esc(recClients[s.client_email]||s.client_email.split('@')[0])}</div></div>
            <div class="podium-orm">${Number(s.steps).toLocaleString()} צעדים</div>
          </div>`).join('')}</div>`:'<div class="no-records">אף מתאמן לא רשם צעדים היום עדיין 🚶</div>'}
        ${myS?`<div class="my-rec-box">👤 הצעדים שלי היום: <strong>${Number(myS.steps).toLocaleString()}</strong></div>`:''}`;
      return;
    }
    const board=buildExBoard(recExercise);
    body.innerHTML=modeTabs+`
      <div class="muscle-tabs">${Object.keys(RECORD_EXERCISES).map(m=>`<button class="m-tab${m===recMuscle?' active':''}" onclick="setRecMuscle('${m}')">${m}</button>`).join('')}</div>
      <select class="ex-select" onchange="setRecEx(this.value)">${(RECORD_EXERCISES[recMuscle]||[]).map(ex=>`<option value="${ex}"${ex===recExercise?' selected':''}>${ex}</option>`).join('')}</select>
      ${board.length?`<div class="podium">${board.map((e,i)=>`
        <div class="podium-row rank-${i+1}">
          <div class="podium-medal">${MEDALS[i]}</div>
          <div class="podium-info"><div class="podium-name">${esc(e.name)}</div><div class="podium-stats">${e.weight} ק"ג × ${e.reps} חזרות · ${e.date}</div></div>
          <div class="podium-orm">1RM: ${e.orm}</div>
        </div>`).join('')}</div>`:'<div class="no-records">אין תוצאות עדיין לתרגיל זה 💪</div>'}`;
  }

  function buildExBoard(exName){
    const best={};
    recLogs.forEach(log=>{
      (log.exercises||[]).forEach(ex=>{
        if(ex.name!==exName) return;
        (ex.sets||[]).forEach(set=>{
          const orm=calc1RM(set.weight,set.reps); if(!orm) return;
          const cur=best[log.client_email];
          if(!cur||orm>cur.orm||(orm===cur.orm&&parseFloat(set.weight)>cur.weight)){
            best[log.client_email]={name:recClients[log.client_email]||log.client_email.split('@')[0],weight:parseFloat(set.weight),reps:parseInt(set.reps),orm,date:log.log_date};
          }
        });
      });
    });
    return Object.values(best).sort((a,b)=>b.orm-a.orm||b.weight-a.weight).slice(0,3);
  }

  function setRecMode(m)   { recMode=m; renderRecBody(); }
  function setRecMuscle(m) { recMuscle=m; recExercise=RECORD_EXERCISES[m][0]; renderRecBody(); }
  function setRecEx(ex)    { recExercise=ex; renderRecBody(); }

  async function logSteps() {
    const val=parseInt(document.getElementById('steps-inp').value);
    if(!val||val<0) return;
    const today=new Date().toISOString().split('T')[0];
    const btn=document.querySelector('.btn-save-steps');
    btn.disabled=true; btn.textContent='שומר...';
    const { error } = await sb.from('steps_logs').upsert({client_email:coachEmail,steps:val,log_date:today},{onConflict:'client_email,log_date'});
    btn.disabled=false; btn.textContent='שמור';
    if(error){ toast('שגיאה בשמירה','err'); return; }
    const idx=recSteps.findIndex(s=>s.client_email===coachEmail);
    if(idx>=0) recSteps[idx].steps=val; else recSteps.push({client_email:coachEmail,steps:val});
    renderRecBody();
  }

  init();
</script>
</body>
</html>
