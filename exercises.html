<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>מאגר תרגילים — Fit Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0a0a0a; --card:#111; --border:rgba(255,255,255,0.08);
    --orange:#FF6B00; --gold:#FFD700; --muted:#777; --text:#fff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;min-height:100vh;}

  /* HEADER */
  .header{background:#111;border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.5);}
  .header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .logo{font-size:1.3rem;font-weight:900;color:var(--orange);white-space:nowrap;}
  .logo span{color:#fff;font-weight:300;font-size:1rem;}
  .search-wrap{flex:1;min-width:160px;position:relative;}
  .search-wrap input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:9px;color:#fff;font-family:'Heebo',sans-serif;font-size:0.88rem;padding:8px 12px 8px 34px;outline:none;transition:border-color .2s;}
  .search-wrap input:focus{border-color:rgba(255,107,0,0.5);}
  .search-wrap input::placeholder{color:#444;}
  .s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#444;pointer-events:none;font-size:0.85rem;}
  .count{background:rgba(255,107,0,0.12);border:1px solid rgba(255,107,0,0.25);color:var(--orange);border-radius:7px;padding:4px 11px;font-size:0.76rem;font-weight:700;white-space:nowrap;}

  /* FILTERS */
  .filters{max-width:1200px;margin:14px auto 0;padding:0 16px;display:flex;gap:8px;flex-wrap:wrap;}
  .fsel{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;color:#bbb;font-family:'Heebo',sans-serif;font-size:0.8rem;padding:6px 10px;outline:none;cursor:pointer;}
  .fsel:focus{border-color:rgba(255,107,0,0.4);}
  .fsel option{background:#1a1a1a;}
  .btn-rst{background:none;border:1px solid rgba(255,107,0,0.3);border-radius:8px;color:var(--orange);font-family:'Heebo',sans-serif;font-size:0.8rem;padding:6px 12px;cursor:pointer;}
  .btn-rst:hover{background:rgba(255,107,0,0.08);}

  /* GRID */
  .wrap{max-width:1200px;margin:18px auto;padding:0 16px 50px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:13px;}

  /* CARD */
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .18s,border-color .18s,box-shadow .18s;}
  .card:hover{transform:translateY(-3px);border-color:rgba(255,107,0,0.4);box-shadow:0 6px 20px rgba(255,107,0,0.1);}
  .card-img{position:relative;width:100%;padding-top:75%;background:#0d0d0d;overflow:hidden;}
  .card-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .card-img .f2{opacity:0;}
  .card-img.play .f1{animation:fr1 1.4s steps(1) infinite;}
  .card-img.play .f2{animation:fr2 1.4s steps(1) infinite;}
  @keyframes fr1{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes fr2{0%,49%{opacity:0}50%,100%{opacity:1}}
  .no-img{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#2a2a2a;font-size:2.5rem;}
  .card-body{padding:9px 11px 11px;}
  .card-name{font-size:0.8rem;font-weight:700;color:#eee;margin-bottom:5px;line-height:1.3;text-transform:capitalize;}
  .card-tags{display:flex;flex-wrap:wrap;gap:3px;}
  .tag{font-size:0.62rem;padding:2px 6px;border-radius:5px;font-weight:700;}
  .tm{background:rgba(255,107,0,0.1);color:var(--orange);border:1px solid rgba(255,107,0,0.22);}
  .te{background:rgba(255,255,255,0.04);color:#666;border:1px solid rgba(255,255,255,0.07);}
  .tl{background:rgba(255,215,0,0.07);color:#cc9900;border:1px solid rgba(255,215,0,0.18);}

  /* LOADER */
  #ldr{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:35vh;gap:12px;}
  .spin{width:36px;height:36px;border:3px solid rgba(255,107,0,0.15);border-top-color:var(--orange);border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg)}}
  #ldr-txt{color:#444;font-size:0.82rem;}
  #empty{display:none;text-align:center;padding:50px;color:#444;}
  #empty div{font-size:2rem;margin-bottom:8px;}

  /* PAGINATION */
  .pag{display:flex;justify-content:center;gap:6px;margin-top:22px;flex-wrap:wrap;}
  .pb{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:7px;color:#999;font-family:'Heebo',sans-serif;font-size:0.8rem;padding:6px 12px;cursor:pointer;transition:all .15s;}
  .pb:hover,.pb.on{background:rgba(255,107,0,0.12);border-color:rgba(255,107,0,0.35);color:var(--orange);}
  .pb:disabled{opacity:.25;cursor:default;}

  /* MODAL */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
  .ov.open{display:flex;}
  .modal{background:#111;border:1px solid rgba(255,107,0,0.2);border-radius:14px;width:100%;max-width:680px;overflow:hidden;margin:auto;box-shadow:0 0 50px rgba(255,107,0,0.12);}
  .m-imgs{display:flex;gap:3px;background:#0a0a0a;min-height:180px;}
  .m-imgs img{flex:1;object-fit:cover;max-height:260px;min-width:0;}
  .m-top{position:relative;}
  .m-close{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.12);border-radius:50%;color:#fff;width:32px;height:32px;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .m-close:hover{background:rgba(255,107,0,0.3);}
  .m-body{padding:18px 20px 22px;}
  .m-name{font-size:1.2rem;font-weight:900;text-transform:capitalize;margin-bottom:10px;}
  .m-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;}
  .mt{font-size:0.73rem;padding:3px 9px;border-radius:6px;font-weight:700;}
  .mt-p{background:rgba(255,107,0,0.1);color:var(--orange);border:1px solid rgba(255,107,0,0.25);}
  .mt-s{background:rgba(255,255,255,0.04);color:#666;border:1px solid rgba(255,255,255,0.08);}
  .mt-e{background:rgba(100,180,255,0.07);color:#64b4ff;border:1px solid rgba(100,180,255,0.18);}
  .mt-l{background:rgba(255,215,0,0.07);color:#cc9900;border:1px solid rgba(255,215,0,0.18);}
  .m-sec-title{font-size:0.7rem;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
  .m-steps{list-style:none;display:flex;flex-direction:column;gap:7px;}
  .m-steps li{font-size:0.83rem;color:#bbb;line-height:1.55;padding-right:24px;position:relative;}
  .m-steps li::before{content:attr(data-n);position:absolute;right:0;top:2px;width:16px;height:16px;background:rgba(255,107,0,0.18);border-radius:50%;font-size:0.62rem;font-weight:700;color:var(--orange);text-align:center;line-height:16px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">FJ <span>מאגר תרגילים</span></div>
    <div class="search-wrap">
      <span class="s-icon">🔍</span>
      <input id="q" type="text" placeholder="חיפוש תרגיל..."/>
    </div>
    <div class="count" id="cnt">טוען...</div>
  </div>
</div>

<div class="filters" id="filters" style="display:none;">
  <select class="fsel" id="f-cat"><option value="">כל הקטגוריות</option></select>
  <select class="fsel" id="f-mus"><option value="">כל השרירים</option></select>
  <select class="fsel" id="f-eq"><option value="">כל הציוד</option></select>
  <select class="fsel" id="f-lv"><option value="">כל הרמות</option></select>
  <button class="btn-rst" onclick="reset()">איפוס</button>
</div>

<div class="wrap">
  <div id="ldr"><div class="spin"></div><div id="ldr-txt">טוען 870 תרגילים...</div></div>
  <div id="empty"><div>🔍</div>לא נמצאו תרגילים</div>
  <div class="grid" id="grid"></div>
  <div class="pag" id="pag"></div>
</div>

<div class="ov" id="ov" onclick="if(event.target===this)close()">
  <div class="modal">
    <div class="m-top">
      <div class="m-imgs" id="m-imgs"></div>
      <button class="m-close" onclick="close()">✕</button>
    </div>
    <div class="m-body">
      <div class="m-name" id="m-name"></div>
      <div class="m-tags" id="m-tags"></div>
      <div id="m-inst-wrap"><div class="m-sec-title">הוראות ביצוע</div><ol class="m-steps" id="m-steps"></ol></div>
    </div>
  </div>
</div>

<script>
const BASE = 'https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/';
const LVL  = {beginner:'מתחיל',intermediate:'ביניים',expert:'מתקדם'};
const CAT  = {strength:'כוח',cardio:'קרדיו',stretching:'מתיחות',plyometrics:'פליומטריקס',powerlifting:'פאוורליפטינג','olympic weightlifting':'הרמת משקולות',strongman:'סטרונגמן'};
const PG   = 60;
let all=[], flt=[], pg=0;

async function init(){
  const K='fj_exdb3';
  let data=null;
  try{const c=localStorage.getItem(K);if(c)data=JSON.parse(c);}catch(e){}
  if(!data){
    const r=await fetch(BASE+'dist/exercises.json');
    data=await r.json();
    try{localStorage.setItem(K,JSON.stringify(data));}catch(e){}
  }
  all=data;
  buildFilters(data);
  document.getElementById('filters').style.display='flex';
  apply();
}

function buildFilters(d){
  const add=(id,arr,fn)=>{const el=document.getElementById(id);arr.sort().forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=fn?fn(v):v;el.appendChild(o);});};
  add('f-cat',[...new Set(d.map(e=>e.category).filter(Boolean))],v=>CAT[v]||v);
  add('f-mus',[...new Set(d.flatMap(e=>e.primaryMuscles||[]))]);
  add('f-eq', [...new Set(d.map(e=>e.equipment).filter(Boolean))]);
  add('f-lv', [...new Set(d.map(e=>e.level).filter(Boolean))],v=>LVL[v]||v);
  ['q','f-cat','f-mus','f-eq','f-lv'].forEach(id=>document.getElementById(id).addEventListener(id==='q'?'input':'change',()=>{pg=0;apply();}));
}

function reset(){['q','f-cat','f-mus','f-eq','f-lv'].forEach(id=>{const el=document.getElementById(id);if(el.tagName==='INPUT')el.value='';else el.value='';});pg=0;apply();}

function apply(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const cat=document.getElementById('f-cat').value;
  const mus=document.getElementById('f-mus').value;
  const eq=document.getElementById('f-eq').value;
  const lv=document.getElementById('f-lv').value;
  flt=all.filter(e=>{
    if(q&&!e.name.toLowerCase().includes(q))return false;
    if(cat&&e.category!==cat)return false;
    if(mus&&!(e.primaryMuscles||[]).includes(mus))return false;
    if(eq&&e.equipment!==eq)return false;
    if(lv&&e.level!==lv)return false;
    return true;
  });
  document.getElementById('cnt').textContent=flt.length+' תרגילים';
  document.getElementById('empty').style.display=flt.length?'none':'block';
  render();
}

function render(){
  document.getElementById('ldr').style.display='none';
  const slice=flt.slice(pg*PG,(pg+1)*PG);
  document.getElementById('grid').innerHTML=slice.map(ex=>{
    const imgs=ex.images||[];
    const i0=imgs[0]?BASE+'exercises/'+imgs[0]:null;
    const i1=imgs[1]?BASE+'exercises/'+imgs[1]:null;
    const m=(ex.primaryMuscles||[])[0]||'';
    return `<div class="card" onclick="openEx(${JSON.stringify(ex.id)})">
      <div class="card-img" id="ci${ex.id.replace(/\W/g,'_')}">
        ${i0?`<img class="f1" src="${i0}" loading="lazy"/>${i1?`<img class="f2" src="${i1}" loading="lazy"/>`:''}`:
        '<div class="no-img">💪</div>'}
      </div>
      <div class="card-body">
        <div class="card-name">${ex.name}</div>
        <div class="card-tags">
          ${m?`<span class="tag tm">${m}</span>`:''}
          ${ex.equipment?`<span class="tag te">${ex.equipment}</span>`:''}
          ${ex.level?`<span class="tag tl">${LVL[ex.level]||ex.level}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('grid').querySelectorAll('.card').forEach(card=>{
    const img=card.querySelector('.card-img');
    if(!img||!img.querySelector('.f2'))return;
    card.addEventListener('mouseenter',()=>img.classList.add('play'));
    card.addEventListener('mouseleave',()=>img.classList.remove('play'));
  });

  renderPag();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderPag(){
  const tot=Math.ceil(flt.length/PG);
  const el=document.getElementById('pag');
  if(tot<=1){el.innerHTML='';return;}
  let h=`<button class="pb" onclick="go(${pg-1})" ${pg===0?'disabled':''}>◀</button>`;
  const s=Math.max(0,pg-2),e=Math.min(tot-1,pg+2);
  if(s>0)h+=`<button class="pb" onclick="go(0)">1</button>${s>1?'<span style="color:#333;padding:0 3px">…</span>':''}`;
  for(let i=s;i<=e;i++)h+=`<button class="pb ${i===pg?'on':''}" onclick="go(${i})">${i+1}</button>`;
  if(e<tot-1)h+=`${e<tot-2?'<span style="color:#333;padding:0 3px">…</span>':''}<button class="pb" onclick="go(${tot-1})">${tot}</button>`;
  h+=`<button class="pb" onclick="go(${pg+1})" ${pg===tot-1?'disabled':''}>▶</button>`;
  el.innerHTML=h;
}

function go(p){pg=p;render();}

function openEx(id){
  const ex=all.find(e=>e.id===id);
  if(!ex)return;
  const imgs=ex.images||[];
  document.getElementById('m-imgs').innerHTML=imgs.map(p=>`<img src="${BASE+'exercises/'+p}" loading="lazy" alt="${ex.name}"/>`).join('')||`<div style="height:180px;display:flex;align-items:center;justify-content:center;color:#222;font-size:3rem;width:100%;">💪</div>`;
  document.getElementById('m-name').textContent=ex.name;
  const tags=[
    ...(ex.primaryMuscles||[]).map(m=>`<span class="mt mt-p">${m}</span>`),
    ...(ex.secondaryMuscles||[]).map(m=>`<span class="mt mt-s">${m}</span>`),
    ex.equipment?`<span class="mt mt-e">${ex.equipment}</span>`:'',
    ex.level?`<span class="mt mt-l">${LVL[ex.level]||ex.level}</span>`:'',
    ex.category?`<span class="mt" style="background:rgba(255,255,255,0.04);color:#555;border:1px solid rgba(255,255,255,0.07);">${CAT[ex.category]||ex.category}</span>`:'',
  ].filter(Boolean).join('');
  document.getElementById('m-tags').innerHTML=tags;
  const steps=ex.instructions||[];
  document.getElementById('m-steps').innerHTML=steps.map((s,i)=>`<li data-n="${i+1}">${s}</li>`).join('');
  document.getElementById('m-inst-wrap').style.display=steps.length?'block':'none';
  document.getElementById('ov').classList.add('open');
  document.body.style.overflow='hidden';
}

function close(){
  document.getElementById('ov').classList.remove('open');
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')close();});
init().catch(err=>{document.getElementById('ldr').innerHTML=`<div style="color:#f87171">שגיאה: ${err.message}</div>`;});
</script>
</body>
</html>
