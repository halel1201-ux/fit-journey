<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a0a0a'/><text x='16' y='23' font-family='Arial Black,sans-serif' font-size='15' font-weight='900' fill='%23FF6B00' text-anchor='middle'>HF</text></svg>"/>
  <title>אזור אישי — HF Coaching</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange:#FF6B00; --gold:#FFD700; --black:#090909; --graphite:#111; --white:#fff; --muted:#aaa; --card:rgba(255,255,255,0.04); --border:rgba(255,107,0,0.25); }
    html { scroll-behavior: smooth; }
    body { font-family: 'Heebo', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: var(--black); } ::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 3px; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(9,9,9,0.92); backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,107,0,0.15);
      padding: 0 24px; height: 62px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-hf { font-size: 1.4rem; font-weight: 900; background: linear-gradient(135deg, var(--orange), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav-greeting { font-size: 0.9rem; color: var(--muted); }
    .nav-greeting span { color: var(--white); font-weight: 700; }
    .btn-logout {
      padding: 7px 18px; background: transparent; border: 1px solid rgba(255,107,0,0.4);
      border-radius: 6px; color: var(--orange); font-family: 'Heebo', sans-serif;
      font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .btn-logout:hover { background: rgba(255,107,0,0.1); }

    /* LAYOUT */
    .container { max-width: 900px; margin: 0 auto; padding: 36px 20px 60px; }

    /* TIMER CARD */
    .timer-card {
      background: linear-gradient(135deg, rgba(255,107,0,0.1), rgba(255,215,0,0.04));
      border: 1px solid rgba(255,107,0,0.4);
      border-radius: 18px; padding: 32px 28px;
      display: flex; align-items: center; gap: 28px;
      margin-bottom: 32px;
      box-shadow: 0 0 40px rgba(255,107,0,0.1);
    }
    .timer-num {
      font-size: clamp(3rem, 8vw, 5rem); font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, var(--orange), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      flex-shrink: 0;
    }
    .timer-num.expired { background: #555; -webkit-background-clip: text; background-clip: text; }
    .timer-info h2 { font-size: 1.2rem; font-weight: 900; margin-bottom: 4px; }
    .timer-info p  { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
    .timer-info .plan-badge {
      display: inline-block; margin-top: 8px; padding: 3px 12px;
      background: rgba(255,107,0,0.12); border: 1px solid rgba(255,107,0,0.3);
      border-radius: 20px; font-size: 0.78rem; font-weight: 700; color: var(--orange);
    }
    @media (max-width: 480px) { .timer-card { flex-direction: column; text-align: center; gap: 16px; } }

    /* SECTION */
    .section { margin-bottom: 36px; }
    .sec-title {
      font-size: 1.25rem; font-weight: 900; margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .sec-title::after { content: ''; flex: 1; height: 1px; background: rgba(255,107,0,0.2); }
    .sec-title .icon { font-size: 1.1rem; }

    /* TRAINING */
    .day-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 12px; overflow: hidden;
    }
    .day-header {
      padding: 14px 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      font-weight: 700; font-size: 0.97rem;
      transition: background 0.2s;
    }
    .day-header:hover { background: rgba(255,107,0,0.06); }
    .day-header .arr { color: var(--orange); transition: transform 0.2s; font-size: 0.85rem; }
    .day-card.open .arr { transform: rotate(180deg); }
    .day-body { display: none; padding: 0 18px 16px; }
    .day-card.open .day-body { display: block; }
    .exercise-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
      gap: 12px;
    }
    .exercise-row:last-child { border-bottom: none; }
    .ex-name { font-size: 0.93rem; font-weight: 600; flex: 1; }
    .ex-sets { font-size: 0.82rem; color: var(--orange); font-weight: 700; white-space: nowrap; }
    .ex-video {
      padding: 5px 12px; background: rgba(255,107,0,0.1); border: 1px solid rgba(255,107,0,0.35);
      border-radius: 6px; color: var(--orange); font-size: 0.78rem; font-weight: 700;
      text-decoration: none; white-space: nowrap; transition: background 0.2s;
    }
    .ex-video:hover { background: rgba(255,107,0,0.2); }

    /* NUTRITION */
    .meal-block { margin-bottom: 20px; }
    .meal-name {
      font-size: 0.9rem; font-weight: 900; color: var(--gold);
      margin-bottom: 8px; padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,215,0,0.15);
    }
    .nutri-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .nutri-table th {
      padding: 7px 10px; text-align: right; font-size: 0.75rem;
      font-weight: 700; color: var(--muted); border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nutri-table td {
      padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .nutri-table tr:last-child td { border-bottom: none; }
    .nutri-table .total-row td { font-weight: 700; color: var(--orange); border-top: 1px solid rgba(255,107,0,0.2); padding-top: 10px; }
    .nutri-table .num { color: var(--muted); font-size: 0.83rem; }

    /* LIB BANNER */
    .lib-banner {
      display: flex; align-items: center; gap: 16px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 22px; margin-bottom: 32px;
      text-decoration: none; color: var(--white);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .lib-banner:hover { border-color: rgba(255,107,0,0.5); box-shadow: 0 4px 24px rgba(255,107,0,0.12); }
    .lib-icon { font-size: 1.8rem; flex-shrink: 0; }
    .lib-text { flex: 1; }
    .lib-title { font-size: 1rem; font-weight: 700; }
    .lib-sub { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
    .lib-arrow { color: var(--orange); font-size: 1.1rem; font-weight: 900; }

    /* RECIPES */
    .recipe-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .rcf-btn {
      padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04); color: var(--muted);
      font-family: 'Heebo', sans-serif; font-size: 0.8rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .rcf-btn.active { background: rgba(255,107,0,0.15); border-color: var(--orange); color: var(--orange); }
    .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .recipe-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; cursor: pointer; transition: all 0.2s;
    }
    .recipe-card:hover { border-color: rgba(255,107,0,0.5); box-shadow: 0 4px 20px rgba(255,107,0,0.12); transform: translateY(-2px); }
    .rc-img { width: 100%; height: 160px; object-fit: cover; display: block; }
    .rc-img-placeholder { width: 100%; height: 160px; background: rgba(255,107,0,0.06); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    .rc-body { padding: 14px 16px 16px; }
    .rc-cat { display: inline-block; padding: 3px 10px; background: rgba(255,107,0,0.12); border-radius: 20px; font-size: 0.72rem; font-weight: 700; color: var(--orange); margin-bottom: 8px; }
    .rc-name { font-size: 1rem; font-weight: 900; margin-bottom: 10px; }
    .rc-macros { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
    .rc-macro { font-size: 0.78rem; color: var(--muted); }
    .rc-macro span { color: var(--white); font-weight: 700; }
    .rc-time { font-size: 0.78rem; color: var(--muted); }
    .rc-time span { color: var(--gold); font-weight: 700; }

    /* RECIPE MODAL */
    .recipe-modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      z-index: 200; display: none; align-items: flex-end; justify-content: center;
    }
    .recipe-modal-bg.open { display: flex; }
    @media (min-width: 600px) { .recipe-modal-bg { align-items: center; } }
    .recipe-modal {
      background: #111; border: 1px solid rgba(255,107,0,0.25);
      border-radius: 20px 20px 0 0; width: 100%; max-width: 560px;
      max-height: 85vh; overflow-y: auto; padding: 24px 22px 36px;
    }
    @media (min-width: 600px) { .recipe-modal { border-radius: 20px; } }
    .rm-img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 16px; display: block; }
    .rm-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 4px; gap: 12px; }
    .rm-name { font-size: 1.3rem; font-weight: 900; }
    .rm-cat-b { font-size: 0.72rem; font-weight: 700; color: var(--orange); margin-bottom: 14px; }
    .rm-close { background: rgba(255,255,255,0.07); border: none; color: var(--muted); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1rem; flex-shrink: 0; }
    .rm-macros { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .rm-macro-pill { padding: 7px 14px; background: rgba(255,255,255,0.05); border-radius: 20px; text-align: center; }
    .rm-macro-pill .ml { font-size: 0.65rem; color: var(--muted); }
    .rm-macro-pill .mv { font-size: 0.85rem; font-weight: 700; }
    .rm-sec { font-size: 0.75rem; font-weight: 900; color: var(--orange); letter-spacing: 1px; margin-bottom: 10px; }
    .rm-ings { list-style: none; margin-bottom: 22px; }
    .rm-ings li { padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
    .rm-ings li:last-child { border-bottom: none; }
    .rm-ings li::before { content: '•'; color: var(--orange); flex-shrink: 0; }
    .rm-inst { font-size: 0.9rem; line-height: 1.8; color: #ccc; white-space: pre-wrap; }

    /* EMPTY */
    .empty { text-align: center; padding: 40px 20px; color: #444; font-size: 0.9rem; }

    /* LOADER */
    #loader {
      position: fixed; inset: 0; background: var(--black);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; transition: opacity 0.3s;
    }
    .spin {
      width: 40px; height: 40px; border: 3px solid rgba(255,107,0,0.2);
      border-top-color: var(--orange); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* LOG BUTTON */
    .btn-log-day {
      padding: 4px 11px; background: rgba(255,107,0,0.1); border: 1px solid rgba(255,107,0,0.3);
      border-radius: 6px; color: var(--orange); font-family: 'Heebo', sans-serif;
      font-size: 0.75rem; font-weight: 700; cursor: pointer; white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-log-day:hover { background: rgba(255,107,0,0.22); }

    /* WORKOUT SESSION */
    .session-overlay { position: fixed; inset: 0; z-index: 300; background: var(--black); display: none; flex-direction: column; }
    .session-overlay.open { display: flex; }
    .session-hdr {
      flex-shrink: 0; height: 62px; padding: 0 16px;
      background: rgba(9,9,9,0.97); backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,107,0,0.15);
      display: flex; align-items: center; gap: 14px;
    }
    .session-day-title { font-size: 0.95rem; font-weight: 900; flex: 1; }
    .session-clock {
      font-size: 1.25rem; font-weight: 900; font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, var(--orange), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      white-space: nowrap;
    }
    .btn-close-session { background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; padding: 4px 8px; transition: color 0.2s; }
    .btn-close-session:hover { color: var(--white); }
    .session-body { flex: 1; overflow-y: auto; padding: 20px 16px 10px; }
    .session-ex-block { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 14px; padding: 18px 16px; margin-bottom: 18px; }
    .session-ex-num { font-size: 0.7rem; font-weight: 700; color: var(--orange); letter-spacing: 1.5px; margin-bottom: 4px; }
    .session-ex-title { font-size: 1.05rem; font-weight: 900; margin-bottom: 10px; }
    .session-ex-desc { font-size: 0.82rem; color: var(--muted); background: rgba(255,255,255,0.03); border-right: 2px solid rgba(255,107,0,0.35); padding: 8px 12px; margin-bottom: 14px; border-radius: 0 7px 7px 0; line-height: 1.6; }
    .rest-ctrl { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .rest-ctrl-lbl { font-size: 0.78rem; font-weight: 700; color: var(--muted); }
    .rest-ctrl-val { font-size: 0.88rem; font-weight: 700; min-width: 72px; text-align: center; }
    .sets-head { display: grid; grid-template-columns: 52px 1fr 1fr 40px; gap: 8px; margin-bottom: 6px; }
    .sets-head span { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-align: center; }
    .sets-head span:first-child { text-align: right; }
    .s-row { display: grid; grid-template-columns: 52px 1fr 1fr 40px; gap: 8px; align-items: center; margin-bottom: 6px; padding: 6px 8px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid transparent; transition: background 0.2s, border-color 0.2s; }
    .s-row.done { background: rgba(60,210,60,0.07); border-color: rgba(60,210,60,0.2); }
    .s-label { font-size: 0.8rem; font-weight: 700; color: var(--muted); }
    .s-row.done .s-label { color: #4ade80; }
    .s-inp { padding: 8px 6px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: var(--white); font-family: 'Heebo', sans-serif; font-size: 0.9rem; outline: none; text-align: center; width: 100%; }
    .s-inp:focus { border-color: rgba(255,107,0,0.6); }
    .s-inp::placeholder { color: #444; font-size: 0.78rem; }
    .btn-done-set { width: 36px; height: 36px; border-radius: 8px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); color: #555; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.18s; }
    .btn-done-set:hover { border-color: rgba(60,210,60,0.5); color: #4ade80; }
    .s-row.done .btn-done-set { background: rgba(60,210,60,0.14); border-color: rgba(60,210,60,0.45); color: #4ade80; }
    /* REST BANNER */
    .rest-banner { flex-shrink: 0; max-height: 0; overflow: hidden; transition: max-height 0.3s, padding 0.3s; background: linear-gradient(135deg, rgba(255,107,0,0.12), rgba(255,215,0,0.06)); border-top: 1px solid rgba(255,107,0,0.2); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .rest-banner.on { max-height: 64px; padding: 12px 20px; }
    .rest-banner-info { font-size: 1rem; font-weight: 900; }
    .rest-banner-info span { background: linear-gradient(135deg, var(--orange), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .btn-skip-rest { padding: 6px 16px; background: transparent; border: 1px solid rgba(255,107,0,0.4); border-radius: 6px; color: var(--orange); font-family: 'Heebo', sans-serif; font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .btn-skip-rest:hover { background: rgba(255,107,0,0.1); }
    /* SESSION FOOTER */
    .session-ftr { flex-shrink: 0; padding: 14px 16px 22px; border-top: 1px solid rgba(255,255,255,0.07); background: rgba(9,9,9,0.95); }
    .btn-finish { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--orange), #FF8C00); border: none; color: var(--white); font-family: 'Heebo', sans-serif; font-size: 1.05rem; font-weight: 900; border-radius: 10px; cursor: pointer; transition: opacity 0.2s; box-shadow: 0 4px 24px rgba(255,107,0,0.25); }
    .btn-finish:hover { opacity: 0.88; }
    .btn-finish:disabled { opacity: 0.4; cursor: not-allowed; }

    /* HISTORY */
    .hist-card { background: var(--card); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
    .hist-head { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background 0.2s; }
    .hist-head:hover { background: rgba(255,107,0,0.04); }
    .hist-date { font-size: 0.88rem; font-weight: 700; }
    .hist-day  { font-size: 0.78rem; color: var(--orange); margin-top: 2px; }
    .hist-arr  { color: var(--orange); font-size: 0.8rem; transition: transform 0.2s; }
    .hist-card.open .hist-arr { transform: rotate(180deg); }
    .hist-body { display: none; padding: 0 16px 14px; }
    .hist-card.open .hist-body { display: block; }
    .hist-ex { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.84rem; }
    .hist-ex:last-child { border-bottom: none; }
    .hist-ex-name { font-weight: 700; margin-bottom: 2px; }
    .hist-ex-sets { color: var(--muted); font-size: 0.8rem; }
    .hist-note { margin-top: 8px; padding: 7px 10px; background: rgba(255,255,255,0.03); border-radius: 6px; font-size: 0.8rem; color: var(--muted); }
    .btn-del-log { font-size: 0.72rem; color: #555; background: none; border: none; cursor: pointer; padding: 2px 6px; transition: color 0.2s; }
    .btn-del-log:hover { color: #ff7070; }
  </style>
</head>
<body>

<div id="loader"><div class="spin"></div></div>

<nav>
  <div class="nav-brand">
    <div class="nav-hf">HF</div>
    <div class="nav-greeting">שלום, <span id="client-name">—</span></div>
  </div>
  <button class="btn-logout" onclick="logout()">יציאה</button>
</nav>

<div class="container" id="main" style="display:none;">

  <!-- Timer -->
  <div class="timer-card" id="timer-card">
    <div class="timer-num" id="timer-num">—</div>
    <div class="timer-info">
      <h2 id="timer-label">ימים נותרו לליווי</h2>
      <p id="timer-dates">—</p>
      <span class="plan-badge" id="plan-badge"></span>
    </div>
  </div>

  <!-- Exercise Library -->
  <a href="exercises.html" class="lib-banner">
    <div class="lib-icon">🏋️</div>
    <div class="lib-text">
      <div class="lib-title">מאגר תרגילים</div>
      <div class="lib-sub">סרטוני אנטומיה והסבר לכל תרגיל לפי קבוצת שריר</div>
    </div>
    <div class="lib-arrow">←</div>
  </a>

  <!-- Training Plan -->
  <div class="section">
    <div class="sec-title"><span class="icon">🏋️</span> תוכנית אימונים</div>
    <div id="training-wrap"></div>
  </div>

  <!-- Nutrition Plan -->
  <div class="section">
    <div class="sec-title"><span class="icon">🥗</span> תפריט תזונה</div>
    <div id="nutrition-wrap"></div>
  </div>

  <!-- Workout History -->
  <div class="section">
    <div class="sec-title"><span class="icon">📊</span> יומן אימונים</div>
    <div id="history-wrap"></div>
  </div>

  <!-- Recipes -->
  <div class="section">
    <div class="sec-title"><span class="icon">🍽️</span> ספר מתכונים</div>
    <div class="recipe-filter" id="recipe-filter"></div>
    <div id="recipes-wrap"></div>
  </div>

</div>

<!-- RECIPE MODAL -->
<div class="recipe-modal-bg" id="recipe-modal-bg" onclick="closeRecipeModal(event)">
  <div class="recipe-modal" onclick="event.stopPropagation()">
    <img class="rm-img" id="rm-img" src="" alt="" style="display:none;"/>
    <div class="rm-header">
      <div class="rm-name" id="rm-name"></div>
      <button class="rm-close" onclick="closeRecipeModal()">✕</button>
    </div>
    <div class="rm-cat-b" id="rm-cat"></div>
    <div class="rm-macros" id="rm-macros"></div>
    <div class="rm-sec">מרכיבים</div>
    <ul class="rm-ings" id="rm-ings"></ul>
    <div class="rm-sec">הכנה</div>
    <div class="rm-inst" id="rm-inst"></div>
  </div>
</div>

<!-- WORKOUT SESSION -->
<div class="session-overlay" id="workout-session">
  <div class="session-hdr">
    <div class="session-day-title" id="session-day"></div>
    <div class="session-clock" id="session-clock">00:00</div>
    <button class="btn-close-session" onclick="confirmCloseSession()" title="יציאה מהאימון">✕</button>
  </div>
  <div class="session-body" id="session-body"></div>
  <div class="rest-banner" id="rest-banner">
    <div class="rest-banner-info">⏱ מנוחה: <span id="rest-countdown">01:30</span></div>
    <button class="btn-skip-rest" onclick="skipRest()">דלג</button>
  </div>
  <div class="session-ftr">
    <button class="btn-finish" id="btn-finish" onclick="finishWorkout()">✓ סיים ושלח</button>
  </div>
</div>

<script>
  const URL_ = 'https://luwknflmhvcxgifzxgrk.supabase.co';
  const KEY  = 'sb_publishable_k3M7SfBeiBGs3rTKewBzWQ_7RHRskB9';
  const sb   = supabase.createClient(URL_, KEY);

  let currentEmail      = null;
  let trainingPlanLocal = [];
  let workoutSession    = null;

  async function init() {
    let { data: { session } } = await sb.auth.getSession();

    // Magic link callback — wait for auth state to settle
    if (!session) {
      await new Promise(resolve => {
        const { data: { subscription } } = sb.auth.onAuthStateChange((event, s) => {
          if (event === 'SIGNED_IN' || event === 'SIGNED_OUT') {
            session = s;
            subscription.unsubscribe();
            resolve();
          }
        });
        setTimeout(resolve, 3000);
      });
    }

    if (!session) { window.location.href = 'login.html'; return; }

    const email = session.user.email;
    currentEmail = email;

    const { data: client } = await sb.from('clients').select('*').eq('email', email).single();

    document.getElementById('loader').style.opacity = '0';
    setTimeout(() => document.getElementById('loader').style.display = 'none', 300);
    document.getElementById('main').style.display = 'block';

    // load recipes for everyone regardless of client status
    const { data: recipesAll } = await sb.from('recipes').select('*').order('category').order('name');
    renderRecipes(recipesAll || []);

    if (!client) {
      document.getElementById('client-name').textContent = email.split('@')[0];
      document.getElementById('timer-card').innerHTML = '<div style="color:#555;padding:20px;">ממתין לאישור מאמן — צור קשר עם הלאל להפעלת האזור האישי שלך.</div>';
      return;
    }

    document.getElementById('client-name').textContent = client.name;

    // Timer
    const end   = new Date(client.coaching_end);
    const start = new Date(client.coaching_start);
    const now   = new Date();
    const days  = Math.ceil((end - now) / 86400000);
    const numEl = document.getElementById('timer-num');
    numEl.textContent = days > 0 ? days : '0';
    if (days <= 0) {
      numEl.classList.add('expired');
      document.getElementById('timer-label').textContent = 'הליווי הסתיים';
    } else if (days <= 7) {
      numEl.style.cssText += ';background:linear-gradient(135deg,#ff4444,#ff8800);-webkit-background-clip:text;background-clip:text;';
    }
    document.getElementById('timer-dates').textContent =
      'מ-' + fmt(start) + ' עד ' + fmt(end);
    document.getElementById('plan-badge').textContent = client.plan_type || 'ליווי אישי';

    // Plans + history
    const [{ data: tr }, { data: nu }, { data: logs }] = await Promise.all([
      sb.from('training_plans').select('plan').eq('client_email', email).single(),
      sb.from('nutrition_plans').select('plan').eq('client_email', email).single(),
      sb.from('workout_logs').select('*').eq('client_email', email).order('log_date', { ascending: false }).order('created_at', { ascending: false }).limit(30)
    ]);

    trainingPlanLocal = tr?.plan || [];
    renderTraining(trainingPlanLocal);
    renderNutrition(nu?.plan || []);
    renderHistory(logs || []);
  }

  function fmt(d) {
    return d.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }

  function renderTraining(plan) {
    const wrap = document.getElementById('training-wrap');
    if (!plan.length) { wrap.innerHTML = '<div class="empty">תוכנית אימונים תתווסף בקרוב 💪</div>'; return; }
    wrap.innerHTML = plan.map((day, di) => `
      <div class="day-card" id="day-${di}">
        <div class="day-header" onclick="toggleDay(${di})">
          <span style="flex:1;">
            <span style="font-weight:700;">${day.name || day.day || ''}</span>
            ${(day.muscles && day.muscles.length) ? `<span style="margin-right:8px;">${day.muscles.map(m => `<span style="display:inline-block;padding:1px 8px;border-radius:10px;background:rgba(255,107,0,0.12);border:1px solid rgba(255,107,0,0.25);color:var(--orange);font-size:0.7rem;font-weight:700;margin-right:3px;">${m}</span>`).join('')}</span>` : ''}
          </span>
          <button class="btn-log-day" onclick="event.stopPropagation();startWorkout(${di})">▶ החל אימון</button>
          <span class="arr" style="margin-right:8px;">▼</span>
        </div>
        <div class="day-body">
          ${(day.exercises || []).map(ex => `
            <div class="exercise-row">
              <span class="ex-name">${ex.name}</span>
              ${ex.sets ? `<span class="ex-sets">${ex.sets}</span>` : ''}
              ${ex.video_url ? `<a class="ex-video" href="${ex.video_url}" target="_blank" rel="noopener">▶ צפה</a>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  function toggleDay(i) {
    document.getElementById('day-' + i).classList.toggle('open');
  }

  function renderNutrition(plan) {
    const wrap = document.getElementById('nutrition-wrap');
    if (!plan.length) { wrap.innerHTML = '<div class="empty">תפריט תזונה יתווסף בקרוב 🥗</div>'; return; }
    wrap.innerHTML = plan.map(meal => {
      const items = meal.items || [];
      const totals = items.reduce((a, i) => ({
        cal: a.cal + (+i.calories || 0),
        pro: a.pro + (+i.protein  || 0),
        car: a.car + (+i.carbs    || 0),
        fat: a.fat + (+i.fat      || 0)
      }), { cal: 0, pro: 0, car: 0, fat: 0 });

      return `
        <div class="meal-block">
          <div class="meal-name">${meal.meal}</div>
          <table class="nutri-table">
            <thead><tr>
              <th>מזון</th><th>כמות</th>
              <th>קל׳</th><th>חלבון</th><th>פחמימה</th><th>שומן</th>
            </tr></thead>
            <tbody>
              ${items.map(i => `<tr>
                <td>${i.food}</td>
                <td class="num">${i.quantity || '—'}</td>
                <td class="num">${i.calories || '—'}</td>
                <td class="num">${i.protein  || '—'}</td>
                <td class="num">${i.carbs    || '—'}</td>
                <td class="num">${i.fat      || '—'}</td>
              </tr>`).join('')}
              <tr class="total-row">
                <td colspan="2">סה"כ</td>
                <td>${totals.cal}</td><td>${totals.pro}</td>
                <td>${totals.car}</td><td>${totals.fat}</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }).join('');
  }

  async function logout() {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  }

  /* ── WORKOUT SESSION ── */
  function startWorkout(di) {
    const day = trainingPlanLocal[di];
    if (!day) return;
    workoutSession = {
      dayName: day.name || day.day || '',
      startTime: Date.now(),
      timerInterval: null,
      restInterval: null,
      restRemaining: 0,
      exercises: (day.exercises || []).map(ex => {
        const { count, plannedReps } = parseSets(ex.sets);
        return {
          name: ex.name,
          description: ex.description || '',
          restTime: ex.rest_time || 90,
          sets: Array.from({ length: count }, () => ({
            weight: '',
            reps: plannedReps ? String(plannedReps) : '',
            completed: false
          }))
        };
      })
    };
    document.getElementById('session-day').textContent = day.name || day.day || '';
    document.getElementById('session-clock').textContent = '00:00';
    renderSession();
    document.getElementById('workout-session').classList.add('open');
    document.body.style.overflow = 'hidden';
    workoutSession.timerInterval = setInterval(tickClock, 1000);
  }

  function parseSets(spec) {
    const m = (spec || '').match(/^(\d+)(?:[xX×](\d+))?/);
    if (!m) return { count: 3, plannedReps: null };
    return { count: Math.min(parseInt(m[1]), 10), plannedReps: m[2] ? parseInt(m[2]) : null };
  }

  function tickClock() {
    if (!workoutSession) return;
    const s = Math.floor((Date.now() - workoutSession.startTime) / 1000);
    const m = Math.floor(s / 60).toString().padStart(2, '0');
    const sec = (s % 60).toString().padStart(2, '0');
    document.getElementById('session-clock').textContent = m + ':' + sec;
  }

  function renderSession() {
    document.getElementById('session-body').innerHTML = workoutSession.exercises.map((ex, ei) => `
      <div class="session-ex-block">
        <div class="session-ex-num">תרגיל ${ei + 1}</div>
        <div class="session-ex-title">${esc(ex.name)}</div>
        ${ex.description ? `<div class="session-ex-desc">${esc(ex.description)}</div>` : ''}
        <div class="rest-ctrl">
          <span class="rest-ctrl-lbl">⏱ מנוחה בין סטים:</span>
          <span class="rest-ctrl-val" style="color:var(--orange);">${fmtRest(ex.restTime)}</span>
        </div>
        <div class="sets-head">
          <span></span><span>משקל (ק"ג)</span><span>חזרות</span><span></span>
        </div>
        ${ex.sets.map((s, si) => sRowHtml(ei, si, s)).join('')}
      </div>
    `).join('');
  }

  function sRowHtml(ei, si, s) {
    return `<div class="s-row${s.completed ? ' done' : ''}" id="sr-${ei}-${si}">
      <span class="s-label">סט ${si + 1}</span>
      <input class="s-inp" type="number" min="0" step="0.5" value="${s.weight}" placeholder="0"
        oninput="workoutSession.exercises[${ei}].sets[${si}].weight=this.value"/>
      <input class="s-inp" type="number" min="0" value="${s.reps}" placeholder="0"
        oninput="workoutSession.exercises[${ei}].sets[${si}].reps=this.value"/>
      <button class="btn-done-set" onclick="toggleSet(${ei},${si})">${s.completed ? '✓' : '○'}</button>
    </div>`;
  }

  function toggleSet(ei, si) {
    if (!workoutSession) return;
    const set = workoutSession.exercises[ei].sets[si];
    set.completed = !set.completed;
    const row = document.getElementById(`sr-${ei}-${si}`);
    if (row) {
      row.className = `s-row${set.completed ? ' done' : ''}`;
      row.querySelector('.btn-done-set').textContent = set.completed ? '✓' : '○';
    }
    if (set.completed) {
      const rt = workoutSession.exercises[ei].restTime;
      if (rt > 0) startRest(rt);
    }
  }

  function fmtRest(s) {
    if (s < 60) return s + ' שנ׳';
    const m = Math.floor(s / 60), r = s % 60;
    return r ? `${m}:${r.toString().padStart(2, '0')} דק׳` : m + ' דק׳';
  }

  function startRest(seconds) {
    if (!workoutSession) return;
    clearInterval(workoutSession.restInterval);
    workoutSession.restRemaining = seconds;
    updateRestBanner();
    document.getElementById('rest-banner').classList.add('on');
    workoutSession.restInterval = setInterval(() => {
      workoutSession.restRemaining--;
      updateRestBanner();
      if (workoutSession.restRemaining <= 0) {
        clearInterval(workoutSession.restInterval);
        const b = document.getElementById('rest-banner');
        b.style.background = 'rgba(60,210,60,0.18)';
        setTimeout(() => {
          b.classList.remove('on');
          setTimeout(() => { b.style.background = ''; }, 300);
        }, 1000);
      }
    }, 1000);
  }

  function updateRestBanner() {
    const s = workoutSession.restRemaining;
    document.getElementById('rest-countdown').textContent =
      Math.floor(s / 60).toString().padStart(2, '0') + ':' + (s % 60).toString().padStart(2, '0');
  }

  function skipRest() {
    if (!workoutSession) return;
    clearInterval(workoutSession.restInterval);
    workoutSession.restRemaining = 0;
    document.getElementById('rest-banner').classList.remove('on');
  }

  function confirmCloseSession() {
    if (confirm('לצאת מהאימון? ההתקדמות לא תישמר.')) closeSession();
  }

  function closeSession() {
    if (!workoutSession) return;
    clearInterval(workoutSession.timerInterval);
    clearInterval(workoutSession.restInterval);
    workoutSession = null;
    document.getElementById('workout-session').classList.remove('open');
    document.body.style.overflow = '';
  }

  async function finishWorkout() {
    if (!workoutSession) return;
    const btn = document.getElementById('btn-finish');
    const elapsed = Math.floor((Date.now() - workoutSession.startTime) / 1000);
    const exercises = workoutSession.exercises
      .map(ex => ({
        name: ex.name,
        sets: ex.sets
          .filter(s => s.completed || s.weight !== '' || s.reps !== '')
          .map(s => ({ weight: s.weight, reps: s.reps, completed: s.completed }))
      }))
      .filter(ex => ex.sets.length > 0);

    if (!exercises.length) { alert('יש לסיים לפחות סט אחד לפני שמירה'); return; }

    btn.disabled = true; btn.textContent = 'שומר...';
    const { error } = await sb.from('workout_logs').insert({
      client_email: currentEmail,
      log_date: new Date().toISOString().split('T')[0],
      day_name: workoutSession.dayName,
      exercises,
      notes: `משך אימון: ${Math.floor(elapsed / 60)} דקות`
    });
    btn.disabled = false; btn.textContent = '✓ סיים ושלח';
    if (error) { alert('שגיאה בשמירה: ' + error.message); return; }

    closeSession();
    const { data: logs } = await sb.from('workout_logs').select('*')
      .eq('client_email', currentEmail)
      .order('log_date', { ascending: false })
      .order('created_at', { ascending: false })
      .limit(30);
    renderHistory(logs || []);
  }

  /* ── HISTORY ── */
  function renderHistory(logs) {
    const wrap = document.getElementById('history-wrap');
    if (!logs.length) {
      wrap.innerHTML = '<div class="empty">עדיין לא תועד אימון — לחץ "✏️ תעד" על כל יום אימון</div>';
      return;
    }
    wrap.innerHTML = logs.map((log, li) => {
      const d = new Date(log.log_date + 'T12:00:00');
      const dateStr = d.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: 'numeric' });
      return `
        <div class="hist-card" id="hc-${li}">
          <div class="hist-head" onclick="document.getElementById('hc-${li}').classList.toggle('open')">
            <div>
              <div class="hist-date">${dateStr}</div>
              <div class="hist-day">${log.day_name}</div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
              <button class="btn-del-log" onclick="event.stopPropagation();deleteLog(${log.id})">מחק</button>
              <span class="hist-arr">▼</span>
            </div>
          </div>
          <div class="hist-body">
            ${(log.exercises || []).map(ex => `
              <div class="hist-ex">
                <div class="hist-ex-name">${esc(ex.name)}</div>
                <div class="hist-ex-sets">
                  ${(ex.sets || []).map((s, i) => `סט ${i+1}: <strong>${s.weight || '—'} ק"ג × ${s.reps || '—'}</strong>`).join(' &nbsp;|&nbsp; ')}
                </div>
              </div>
            `).join('')}
            ${log.notes ? `<div class="hist-note">${esc(log.notes)}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  async function deleteLog(id) {
    if (!confirm('למחוק תיעוד זה?')) return;
    await sb.from('workout_logs').delete().eq('id', id);
    const { data: logs } = await sb.from('workout_logs').select('*')
      .eq('client_email', currentEmail)
      .order('log_date', { ascending: false })
      .order('created_at', { ascending: false })
      .limit(30);
    renderHistory(logs || []);
  }

  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  /* ── RECIPES ── */
  let allRecipes = [];
  let activeRcCat = 'הכל';

  function renderRecipes(data) {
    allRecipes = data;
    const cats = ['הכל', ...new Set(data.map(r => r.category))];
    document.getElementById('recipe-filter').innerHTML = cats.map(c =>
      `<button class="rcf-btn${c === activeRcCat ? ' active' : ''}" onclick="setRcCat('${c}')">${c}</button>`
    ).join('');
    renderRecipeCards();
  }

  function setRcCat(cat) {
    activeRcCat = cat;
    document.querySelectorAll('.rcf-btn').forEach(b => b.classList.toggle('active', b.textContent === cat));
    renderRecipeCards();
  }

  function renderRecipeCards() {
    const wrap = document.getElementById('recipes-wrap');
    const list = activeRcCat === 'הכל' ? allRecipes : allRecipes.filter(r => r.category === activeRcCat);
    if (!list.length) { wrap.innerHTML = '<div class="empty">מתכונים יתווספו בקרוב 🍽️</div>'; return; }
    wrap.innerHTML = `<div class="recipe-grid">${list.map(r => `
      <div class="recipe-card" onclick="openRecipeModal('${r.id}')">
        ${r.image_url
          ? `<img class="rc-img" src="${esc(r.image_url)}" alt="${esc(r.name)}" loading="lazy"/>`
          : `<div class="rc-img-placeholder">🍽️</div>`}
        <div class="rc-body">
          <div class="rc-cat">${esc(r.category)}</div>
          <div class="rc-name">${esc(r.name)}</div>
          <div class="rc-macros">
            ${r.calories ? `<div class="rc-macro">🔥 <span>${r.calories}</span> קק"ל</div>` : ''}
            ${r.protein  ? `<div class="rc-macro">💪 <span>${r.protein}g</span> חלבון</div>` : ''}
            ${r.carbs    ? `<div class="rc-macro">🌾 <span>${r.carbs}g</span> פחמימות</div>` : ''}
            ${r.fat      ? `<div class="rc-macro">🧈 <span>${r.fat}g</span> שומן</div>` : ''}
          </div>
          ${r.prep_time ? `<div class="rc-time">⏱ <span>${r.prep_time} דקות</span></div>` : ''}
        </div>
      </div>
    `).join('')}</div>`;
  }

  function openRecipeModal(id) {
    const r = allRecipes.find(x => x.id === id);
    if (!r) return;
    const imgEl = document.getElementById('rm-img');
    if (r.image_url) { imgEl.src = r.image_url; imgEl.style.display = 'block'; }
    else { imgEl.style.display = 'none'; }
    document.getElementById('rm-name').textContent = r.name;
    document.getElementById('rm-cat').textContent  = r.category;
    const macros = [
      r.calories  ? { l: 'קלוריות',   v: r.calories + ' קק"ל' } : null,
      r.protein   ? { l: 'חלבון',     v: r.protein + 'g' }       : null,
      r.carbs     ? { l: 'פחמימות',   v: r.carbs + 'g' }         : null,
      r.fat       ? { l: 'שומן',      v: r.fat + 'g' }           : null,
      r.prep_time ? { l: 'זמן הכנה',  v: r.prep_time + ' דק׳' }  : null,
    ].filter(Boolean);
    document.getElementById('rm-macros').innerHTML = macros.map(m =>
      `<div class="rm-macro-pill"><div class="ml">${m.l}</div><div class="mv">${m.v}</div></div>`
    ).join('');
    const ings = Array.isArray(r.ingredients) ? r.ingredients : [];
    document.getElementById('rm-ings').innerHTML = ings.map(i => `<li>${esc(i)}</li>`).join('') || '<li>—</li>';
    document.getElementById('rm-inst').textContent = r.instructions || '—';
    document.getElementById('recipe-modal-bg').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeRecipeModal(e) {
    if (e && e.target !== document.getElementById('recipe-modal-bg')) return;
    document.getElementById('recipe-modal-bg').classList.remove('open');
    document.body.style.overflow = '';
  }

  init();
</script>
</body>
</html>
