<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230a0a0a'/><rect x='1.5' y='1.5' width='29' height='29' rx='6.5' fill='none' stroke='%23FF6B00' stroke-width='1' stroke-opacity='0.5'/><text x='16' y='22' font-family='Arial Black,sans-serif' font-size='13' font-weight='900' fill='%23FF6B00' text-anchor='middle'>FJ</text></svg>"/>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF6B00">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HF Coaching">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>פאנל ניהול — HF Coaching</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange:#FF6B00; --gold:#FFD700; --black:#090909; --graphite:#111; --white:#fff; --muted:#888; --card:rgba(255,255,255,0.04); --border:rgba(255,107,0,0.25); }
    body { font-family: 'Heebo', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: #0e0e0e; } ::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 3px; }

    /* TOP NAV */
    .topnav {
      height: 58px; background: rgba(9,9,9,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,107,0,0.15);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; position: sticky; top: 0; z-index: 100;
    }
    .topnav-brand { font-size: 1.2rem; font-weight: 900; background: linear-gradient(135deg, var(--orange), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .topnav-sub { font-size: 0.75rem; color: var(--muted); }
    .btn-sm {
      padding: 7px 16px; border-radius: 6px; font-family: 'Heebo', sans-serif;
      font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: background 0.2s, opacity 0.2s;
    }
    .btn-outline { background: transparent; border: 1px solid rgba(255,107,0,0.4); color: var(--orange); }
    .btn-outline:hover { background: rgba(255,107,0,0.1); }
    .btn-orange { background: linear-gradient(135deg, var(--orange), #FF8C00); border: none; color: var(--white); }
    .btn-orange:hover { opacity: 0.88; }
    .btn-orange:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-red { background: transparent; border: 1px solid rgba(255,60,60,0.35); color: #ff7070; font-size: 0.78rem; padding: 4px 10px; }
    .btn-red:hover { background: rgba(255,60,60,0.1); }

    /* LAYOUT */
    .layout { display: flex; min-height: calc(100vh - 58px); }

    /* SIDEBAR */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: rgba(255,255,255,0.02); border-left: 1px solid rgba(255,255,255,0.06);
      display: flex; flex-direction: column;
    }
    .sidebar-head {
      padding: 16px 14px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-title { font-size: 0.78rem; font-weight: 700; color: var(--muted); letter-spacing: 1px; }
    .client-list { flex: 1; overflow-y: auto; }
    .client-item {
      padding: 12px 14px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .client-item:hover { background: rgba(255,107,0,0.06); }
    .client-item.active { background: rgba(255,107,0,0.1); border-right: 3px solid var(--orange); }
    .client-item-name { font-size: 0.9rem; font-weight: 700; }
    .client-item-email { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    /* MAIN */
    .main { flex: 1; overflow-y: auto; padding: 24px 28px 60px; }
    .no-select { display: flex; align-items: center; justify-content: center; height: 300px; color: #333; font-size: 1rem; }

    /* SECTION CARD */
    .sec-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px 22px; margin-bottom: 24px;
    }
    .sec-card-title {
      font-size: 1rem; font-weight: 900; color: var(--white);
      margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between;
    }
    .sec-card-title span { color: var(--orange); }

    /* FORM GRID */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-grid.cols-1 { grid-template-columns: 1fr; }
    @media (max-width: 600px) { .form-grid, .form-grid.cols-3 { grid-template-columns: 1fr; } }
    .f-group { display: flex; flex-direction: column; gap: 5px; }
    .f-group label { font-size: 0.77rem; font-weight: 700; color: var(--muted); }
    .f-group input, .f-group select {
      padding: 9px 12px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 7px;
      color: var(--white); font-family: 'Heebo', sans-serif; font-size: 0.88rem;
      outline: none; transition: border-color 0.2s;
    }
    .f-group input:focus, .f-group select:focus { border-color: var(--orange); }
    .f-group select option { background: #1a1a1a; }

    /* TRAINING EDITOR */
    .day-block { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
    .day-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .day-block-head input { flex: 1; padding: 7px 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: var(--white); font-family: 'Heebo', sans-serif; font-size: 0.88rem; outline: none; }
    .day-block-head input:focus { border-color: var(--orange); }
    .muscle-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 12px; }
    .muscle-pill { padding: 5px 12px; border-radius: 20px; font-family: 'Heebo', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; white-space: nowrap; border: 1px solid rgba(255,255,255,0.12); background: transparent; color: var(--muted); transition: all 0.15s; }
    .muscle-pill:hover { border-color: rgba(255,107,0,0.4); color: var(--white); }
    .muscle-pill.muscle-active { background: rgba(255,107,0,0.15); border-color: var(--orange); color: var(--orange); }
    .ex-row { display: grid; grid-template-columns: 2fr 1fr 3fr auto; gap: 8px; align-items: center; margin-bottom: 7px; }
    .ex-row input { padding: 7px 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: var(--white); font-family: 'Heebo', sans-serif; font-size: 0.82rem; outline: none; }
    .ex-row input:focus { border-color: rgba(255,107,0,0.5); }
    .ex-row input::placeholder { color: #444; }
    @media (max-width: 640px) { .ex-row { grid-template-columns: 1fr 1fr; } }
    .add-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.8rem; font-weight: 700; color: var(--orange);
      background: none; border: none; cursor: pointer; padding: 4px 0;
      transition: opacity 0.2s; font-family: 'Heebo', sans-serif;
    }
    .add-link:hover { opacity: 0.7; }

    /* NUTRITION EDITOR */
    .meal-block { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
    .meal-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .meal-block-head input { flex: 1; padding: 7px 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: var(--white); font-family: 'Heebo', sans-serif; font-size: 0.88rem; outline: none; }
    .meal-block-head input:focus { border-color: var(--orange); }
    .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr auto; gap: 6px; align-items: center; margin-bottom: 6px; }
    .item-row input { padding: 6px 8px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: var(--white); font-family: 'Heebo', sans-serif; font-size: 0.8rem; outline: none; text-align: center; }
    .item-row input:first-child { text-align: right; }
    .item-row input:focus { border-color: rgba(255,107,0,0.5); }
    .item-row input::placeholder { color: #444; font-size: 0.72rem; }
    @media (max-width: 640px) { .item-row { grid-template-columns: 1fr 1fr 1fr; } }
    .nutri-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr auto; gap: 6px; margin-bottom: 6px; }
    .nutri-header span { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-align: center; padding: 0 2px; }
    .nutri-header span:first-child { text-align: right; }

    /* MODAL */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-bg.open { display: flex; }
    .modal { background: #151515; border: 1px solid rgba(255,107,0,0.35); border-radius: 16px; padding: 28px; width: 100%; max-width: 440px; box-shadow: 0 0 60px rgba(255,107,0,0.15); }
    .modal h3 { font-size: 1.1rem; font-weight: 900; margin-bottom: 20px; }
    .modal h3 span { color: var(--orange); }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 22px; border-radius: 8px; font-size: 0.88rem; font-weight: 700;
      z-index: 999; transition: opacity 0.3s; opacity: 0; pointer-events: none;
    }
    .toast.ok  { background: rgba(60,200,60,0.15); border: 1px solid rgba(60,200,60,0.4); color: #70dd70; }
    .toast.err { background: rgba(255,60,60,0.15); border: 1px solid rgba(255,60,60,0.4); color: #ff7070; }
    .toast.show { opacity: 1; }

    /* LOADER */
    #loader { position: fixed; inset: 0; background: var(--black); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .spin { width: 36px; height: 36px; border: 3px solid rgba(255,107,0,0.2); border-top-color: var(--orange); border-radius: 50%; animation: sp 0.7s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }

    /* RECORDS OVERLAY */
    .records-overlay { position: fixed; inset: 0; z-index: 400; background: var(--black); display: none; flex-direction: column; overflow: hidden; }
    .records-overlay.open { display: flex; }
    .rec-hdr { flex-shrink: 0; height: 62px; padding: 0 18px; background: rgba(9,9,9,0.97); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(255,215,0,0.2); display: flex; align-items: center; justify-content: space-between; }
    .rec-hdr-title { font-size: 1.1rem; font-weight: 900; background: linear-gradient(135deg,#FFD700,#FF6B00); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .btn-close-rec { background: rgba(255,255,255,0.07); border: none; color: var(--muted); width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 1rem; }
    .rec-body { flex: 1; overflow-y: auto; padding: 20px 16px 40px; max-width: 700px; margin: 0 auto; width: 100%; }
    .rec-mode-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .rec-tab { padding: 8px 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: var(--muted); font-family:'Heebo',sans-serif; font-size:0.85rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
    .rec-tab.active { background: rgba(255,215,0,0.12); border-color: var(--gold); color: var(--gold); }
    .muscle-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .m-tab { padding: 5px 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); background: transparent; color: #555; font-family:'Heebo',sans-serif; font-size:0.75rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
    .m-tab.active { background: rgba(255,107,0,0.12); border-color: var(--orange); color: var(--orange); }
    .ex-select { width:100%; padding:12px 14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:10px; color:var(--white); font-family:'Heebo',sans-serif; font-size:0.95rem; outline:none; cursor:pointer; margin-bottom:20px; }
    .ex-select:focus { border-color: var(--orange); }
    .podium { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
    .podium-row { display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:14px; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.03); }
    .podium-row.rank-1 { border-color:rgba(255,215,0,0.45); background:rgba(255,215,0,0.06); }
    .podium-row.rank-2 { border-color:rgba(192,192,192,0.3); background:rgba(192,192,192,0.04); }
    .podium-row.rank-3 { border-color:rgba(205,127,50,0.3); background:rgba(205,127,50,0.04); }
    .podium-medal { font-size:1.6rem; flex-shrink:0; width:32px; text-align:center; }
    .podium-info { flex:1; min-width:0; }
    .podium-name { font-size:0.95rem; font-weight:900; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .podium-stats { font-size:0.78rem; color:var(--muted); }
    .podium-orm { font-size:0.9rem; font-weight:700; color:var(--gold); white-space:nowrap; }
    .my-rec-box { padding:13px 16px; border-radius:12px; border:1px solid rgba(255,107,0,0.2); background:rgba(255,107,0,0.05); font-size:0.85rem; color:var(--muted); margin-top:4px; }
    .my-rec-box strong { color:var(--orange); }
    .steps-row { display:flex; gap:10px; margin-bottom:24px; }
    .steps-input { flex:1; padding:12px 14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:10px; color:var(--white); font-family:'Heebo',sans-serif; font-size:0.95rem; outline:none; }
    .steps-input:focus { border-color: var(--orange); }
    .btn-save-steps { padding:12px 20px; background:var(--orange); border:none; border-radius:10px; color:#fff; font-family:'Heebo',sans-serif; font-size:0.9rem; font-weight:700; cursor:pointer; white-space:nowrap; }
    .no-records { text-align:center; padding:40px 20px; color:#444; font-size:0.9rem; }
    .lib-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
    .lib-tab { padding:6px 14px; border-radius:18px; font-family:'Heebo',sans-serif; font-size:0.8rem; font-weight:700; cursor:pointer; white-space:nowrap; border:1px solid rgba(255,107,0,0.25); background:transparent; color:var(--muted); transition:all 0.2s; }
    .lib-tab:hover { color:var(--white); border-color:rgba(255,107,0,0.5); }
    .lib-tab.active { background:linear-gradient(135deg,var(--orange),#FF8C00); border-color:transparent; color:var(--white); }
    .sets-coach-wrap { margin:8px 0; }
    .sets-coach-head { display:grid; grid-template-columns:28px 72px 1fr 22px; gap:6px; padding:3px 8px; font-size:0.68rem; font-weight:700; color:var(--muted); }
    .sets-coach-row { display:grid; grid-template-columns:28px 72px 1fr 22px; gap:6px; align-items:center; padding:4px 8px; background:rgba(255,255,255,0.02); border-radius:6px; margin-bottom:3px; }
    .sets-coach-row input { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:5px; color:#fff; font-family:'Heebo',sans-serif; font-size:0.82rem; padding:4px 6px; outline:none; width:100%; text-align:center; }
    .sets-coach-row input:focus { border-color:var(--orange); }
    .sets-coach-range { display:flex; align-items:center; gap:4px; }
    .sets-coach-range input { width:44px !important; }
    .sets-coach-range span { color:var(--muted); font-size:0.75rem; white-space:nowrap; }
    .btn-add-set { font-size:0.75rem; color:var(--orange); background:none; border:1px dashed rgba(255,107,0,0.3); border-radius:6px; padding:4px 12px; cursor:pointer; margin-top:4px; font-family:'Heebo',sans-serif; }
    .btn-add-set:hover { background:rgba(255,107,0,0.08); }
    .ai-box { background:rgba(255,215,0,0.04); border:1px solid rgba(255,215,0,0.2); border-radius:10px; padding:14px 16px; margin-bottom:18px; }
    .ai-box-title { font-size:0.82rem; font-weight:700; color:var(--gold); margin-bottom:10px; }
    .ai-textarea { width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:var(--white); font-family:'Heebo',sans-serif; font-size:0.88rem; padding:10px 12px; resize:vertical; min-height:72px; outline:none; transition:border-color 0.2s; line-height:1.6; }
    .ai-textarea:focus { border-color:var(--gold); }
    .ai-status { font-size:0.78rem; color:var(--muted); margin-right:10px; }
    /* ── File attachment UI ── */
    .ai-attach-row { display:flex; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap; }
    .btn-attach { display:inline-flex; align-items:center; gap:5px; padding:5px 11px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.14); border-radius:8px; color:var(--muted); font-family:'Heebo',sans-serif; font-size:0.77rem; font-weight:700; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .btn-attach:hover { border-color:rgba(255,107,0,0.4); color:var(--orange); background:rgba(255,107,0,0.05); }
    .btn-attach.has-file { border-color:rgba(74,222,128,0.4); color:#4ade80; background:rgba(74,222,128,0.05); }
    .attach-filename { font-size:0.74rem; color:#4ade80; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px; }
    .btn-attach-clr { background:none; border:none; color:#555; cursor:pointer; font-size:0.82rem; padding:2px 6px; border-radius:4px; transition:color 0.2s; flex-shrink:0; }
    .btn-attach-clr:hover { color:#ff7070; }
    .meal-alts { margin-top:12px; padding:10px 14px; background:rgba(60,180,255,0.04); border:1px solid rgba(60,180,255,0.18); border-radius:8px; }
    .meal-alts-row { display:flex; align-items:flex-start; gap:8px; margin-bottom:5px; flex-wrap:wrap; font-size:0.77rem; }
    .meal-alts-row:last-child { margin-bottom:0; }
    .alt-label { font-weight:700; color:#60b4ff; flex-shrink:0; min-width:60px; }
    .alt-pill { display:inline-block; padding:3px 10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:#ccc; margin:2px; cursor:pointer; transition:background 0.15s,border-color 0.15s,color 0.15s; }
    .alt-pill:hover { background:rgba(255,107,0,0.12); border-color:rgba(255,107,0,0.4); color:#fff; }

    .btn-mob-menu { display:none; align-items:center; gap:5px; background:rgba(255,107,0,0.1); border:1px solid rgba(255,107,0,0.3); border-radius:6px; color:var(--orange); padding:7px 10px; font-family:'Heebo',sans-serif; font-size:0.78rem; font-weight:700; cursor:pointer; white-space:nowrap; }
    .sidebar-bd { display:none; position:fixed; inset:0; top:58px; background:rgba(0,0,0,0.65); z-index:140; }
    .sidebar-bd.open { display:block; }

    @media (max-width: 768px) {
      .layout { display:block; }
      .sidebar { position:fixed; right:0; top:58px; height:calc(100vh - 58px); width:280px; z-index:150; transform:translateX(110%); transition:transform 0.3s ease; box-shadow:-6px 0 24px rgba(0,0,0,0.6); }
      .sidebar.mob-open { transform:translateX(0); }
      .main { padding:16px 14px 60px; width:100%; }
      .btn-mob-menu { display:flex; }
      .topnav { padding:0 10px; flex-wrap:wrap; height:auto; min-height:58px; }
      .topnav-sub { display:none; }
      .topnav-brand { font-size:1rem; }
      .btn-sm { padding:5px 7px; font-size:0.7rem; }
      .sec-card { padding:16px 12px; }
      .form-grid { grid-template-columns:1fr 1fr; }
      .ex-row { grid-template-columns:1fr 1fr; }
      .item-row { grid-template-columns:1fr 1fr 1fr; }
      .nutri-header { grid-template-columns:1fr 1fr 1fr; }
      .nutri-header span:nth-child(n+4) { display:none; }
    }
    @media (max-width: 480px) {
      .form-grid, .form-grid.cols-3 { grid-template-columns:1fr; }

      /* Topnav: tighter on tiny phones */
      .topnav { gap:4px; padding:6px 8px; }
      .btn-sm { padding:4px 6px; font-size:0.65rem; }
      .topnav-brand { font-size:0.88rem; }

      /* Main area */
      .main { padding:10px 8px 60px; }
      .sec-card { padding:12px 10px; margin-bottom:16px; }

      /* Training exercise row: 2 columns */
      .ex-row { grid-template-columns:1fr 1fr; gap:6px; }

  /* ── findFood: Supabase ראשון, fallback ל-FOOD_DB_LOCAL ── */
  function findFood(name) {
    if (allFoodItems.length) {
      const f = allFoodItems.find(fd => fd.name === name);
      if (f && f.calories > 0) return f;
    }
    return FOOD_DB_LOCAL.find(fd => fd.name === name) || null;
  }

  /* ── getMergedFoodList: Supabase + מה שחסר מ-FOOD_DB_LOCAL ── */
  function getMergedFoodList() {
    if (!allFoodItems.length) return FOOD_DB_LOCAL;
    const valid = allFoodItems.filter(f => f.calories > 0);
    const names = new Set(valid.map(f => f.name));
    return [...valid, ...FOOD_DB_LOCAL.filter(f => !names.has(f.name))];
  }

  /* ── macroScore: דמיון יחס מאקרו בין פריט קיים לאלטרנטיבה (0–1) ── */
  function macroScore(refItem, cand) {
    if (!cand || !cand.calories || !refItem) return 0;
    const rp = +(refItem.protein||0)*4, rc = +(refItem.carbs||0)*4, rf = +(refItem.fat||0)*9;
    const rT = rp + rc + rf || 1;
    const cp = +(cand.protein||0)*4,  cc = +(cand.carbs||0)*4,  cf = +(cand.fat||0)*9;
    const cT = cp + cc + cf || 1;
    const dist = Math.abs(rp/rT - cp/cT) + Math.abs(rc/rT - cc/cT) + Math.abs(rf/rT - cf/cT);
    return Math.max(0, 1 - dist / 1.5);
  }

  /* ── getChipOptions: עד 5 חלופות מהמאגר בלבד ── */
  function getChipOptions(mi, category) {
    const meal = nutritionPlan[mi];
    if (!meal || !(meal.items||[]).length) return [];
    const ref = getDominantItem(mi, category);
    if (!ref || !ref.calories) return [];
    const refName = ref.food || ref.name || '';
    /* רק פריטים מהמאגר — מבטיח שיש ערכים תזונתיים לתצוגת ההשוואה */
    return getMergedFoodList()
      .filter(fd => {
        if (fd.name === refName) return false;
        if (category === 'protein') return (fd.protein||0) > 10;
        if (category === 'carbs')   return (fd.carbs||0)   > 20;
        return                             (fd.fat||0)      > 10;
      })
      .map(fd => ({name: fd.name, score: macroScore(ref, fd)}))
      .filter(fd => fd.score > 0.35)
      .sort((a,b) => b.score - a.score)
      .slice(0, 5)
      .map(fd => fd.name);
  }

  function renderChipsRow(mi, category, label) {
    const opts = getChipOptions(mi, category);

    const ref = getDominantItem(mi, category);
    const chips = opts.map(o => {
      const qty = ref ? formatChipQty(o, ref.calories) : '';
      if (!qty) return '';
      const key = 'c' + (++_chipSeq);
      _chipMap[key] = { mi, foodName: o, category };
      return `<span class="alt-pill" onclick="addAltFromChipKey('${key}')" title="לחץ להוסיף לחלופות">${esc(o)}<span style="pointer-events:none;color:var(--orange);font-size:0.72rem;"> (${qty})</span></span>`;
    }).join('');
    if (!chips.replace(/<[^>]+>/g,'').trim()) return '';
    return `<div class="meal-alts-row"><span class="alt-label">${label}:</span><span>${chips}</span></div>`;

    items.forEach(item => {
      const val = category==='protein'?(+item.protein||0):category==='carbs'?(+item.carbs||0):(+item.fat||0);
      if (val > maxVal) { maxVal = val; target = item; }
    });
    return target;
  }

    const items = (nutritionPlan[mi]?.items) || [];

    return idx;

  function formatChipQty(foodName, refCalories) {
    if (!refCalories) return '';
    const af = findFood(foodName);
    if (!af || !af.calories) return '';
    const eqG = Math.round(refCalories / af.calories * 100);
    let specific = FOOD_UNITS_MAP[foodName];
    if (!specific) {
      const key = Object.keys(FOOD_UNITS_MAP).find(k => foodName.startsWith(k));
      specific = key ? FOOD_UNITS_MAP[key] : null;
    }
    if (!specific) return `${eqG}g`;
    const units = specific.filter(u => u.name !== 'גרם' && u.grams >= 5);
    for (const u of units) {
      const qty = eqG / u.grams;
      if (qty >= 0.5 && qty <= 6) {
        const n = Math.round(qty * 2) / 2;
        return `${n} ${unitDisplay(u.name, n)}`;
      }
    }
    return `${eqG}g`;
  }
  function addAltFromChip(mi, foodName, category) {
    const meal = nutritionPlan[mi];
    if (!meal) return;
    const ii = getDominantItemIdx(mi, category);
    const item = (meal.items||[])[ii];
    if (!item) return;
    if (!item.alternatives) item.alternatives = [];
    if (item.alternatives.some(a => a.name === foodName)) { toast(foodName + ' כבר בחלופות', 'err'); return; }
    const af = findFood(foodName);
    item.alternatives.push({ food_id: af ? af.id : 0, name: foodName });
    item._altOpen = true;
    renderNutritionEditor();
    const qty = item.calories ? formatChipQty(foodName, item.calories) : '';

    ['פיתה','יחידה',80],['פיתה מלאה','יחידה',60],['פיתה מלאה','חצי פיתה',30],
    ['פיתה כוסמין','יחידה',75],
    ['בננה','יחידה בינונית',120],['תמר מג׳הול','יחידה',24],
    // שומנים
    ['טחינה','כף',15],['טחינה','כפית',5],['טחינה גולמית','כף',15],['טחינה גולמית','כפית',5],
    ['חמאת בוטנים','כף',15],['חמאת בוטנים','כפית',5],
    ['חמאת בוטנים טבעית','כף',15],['חמאת בוטנים טבעית','כפית',5],
    ['שמן זית','כף',10],['שמן זית','כפית',5],

  ];
  const FOOD_UNITS_MAP = {};
  for (const [food, unit, grams] of FOOD_UNITS_RAW) {
    if (!FOOD_UNITS_MAP[food]) FOOD_UNITS_MAP[food] = [];
    FOOD_UNITS_MAP[food].push({ name: unit, grams });
  }
  const GENERIC_UNITS = [
    { name: 'גרם', grams: 1 },
    { name: 'כף', grams: 15 },
    { name: 'כפית', grams: 5 },
    { name: 'כוס', grams: 240 },
    { name: 'יחידה', grams: 100 },
    { name: 'פרוסה', grams: 30 },
    { name: 'חצי', grams: 50 },
  ];
  function getUnitsForFood(foodName) {
    const specific = FOOD_UNITS_MAP[foodName] || [];
    if (!specific.length) return GENERIC_UNITS;
    const hasGram = specific.some(u => u.name === 'גרם');
    return hasGram ? specific : [{ name: 'גרם', grams: 1 }, ...specific];
  }

  function toggleItemExpand(mi, ii) {
    const item = nutritionPlan[mi].items[ii];
    item._exp = !item._exp;
    if (!item._unit) item._unit = 'גרם';
    if (item._qty == null) item._qty = parseFloat(item.quantity) || 100;
    renderNutritionEditor();
  }
  function setItemUnit(mi, ii, unitName) {
    const item = nutritionPlan[mi].items[ii];
    item._unit = unitName;
    item._qty = unitName === 'גרם' ? 100 : 1;
    recalcItemMacros(mi, ii);
    renderNutritionEditor();
  }
  function setItemQty(mi, ii, qty) {
    nutritionPlan[mi].items[ii]._qty = qty;
    recalcItemMacros(mi, ii);
    renderNutritionEditor();
  }
  function onQuantityInput(mi, ii, val) {
    const item = nutritionPlan[mi].items[ii];
    item.quantity = val;
    const m = String(val).match(/([\d.]+)/);
    if (!m) return;
    const num = parseFloat(m[1]);
    if (!num) return;
    item._unit = item._unit || 'גרם';
    item._qty  = num;
    recalcItemMacros(mi, ii);
    const rowEl = document.getElementById(`item-${mi}-${ii}`);
    if (!rowEl) return;
    rowEl.querySelectorAll('input[type=number]').forEach(inp => {
      if      (inp.placeholder === "קל׳") inp.value = item.calories || '';
      else if (inp.placeholder === 'P')   inp.value = item.protein  || '';
      else if (inp.placeholder === 'C')   inp.value = item.carbs    || '';
      else if (inp.placeholder === 'F')   inp.value = item.fat      || '';
    });
  }
  function recalcItemMacros(mi, ii) {
    const item = nutritionPlan[mi].items[ii];
    const food = findFood(item.food);
    if (!food) return;
    const units = getUnitsForFood(item.food);
    const unit = units.find(u => u.name === item._unit) || { grams: 1 };
    const grams = (item._qty || 1) * unit.grams;
    const r = grams / 100;
    item.calories = Math.round(food.calories * r * 10) / 10;
    item.protein  = Math.round(food.protein  * r * 10) / 10;
    item.carbs    = Math.round(food.carbs    * r * 10) / 10;
    item.fat      = Math.round(food.fat      * r * 10) / 10;
    item.quantity = item._unit === 'גרם'
      ? `${Math.round(grams)} גרם`
      : `${item._qty} ${item._unit} (${Math.round(grams)}g)`;
  }

          if (event === 'SIGNED_IN' || event === 'SIGNED_OUT') {
            session = s;
            subscription.unsubscribe();
            resolve();
          }
        });
        setTimeout(resolve, 3000);
      });

    if (!session || session.user.email !== ADMIN) {
      window.location.href = 'login.html'; return;

  async function toggleCoachExpand(id, email) {
    coachExpanded[id] = !coachExpanded[id];
    renderCoachesTable();
    if (coachExpanded[id]) {
      const needNotifs = !coachNotifsCache[email];
      const needStats  = !coachStatsCache[email];
      const queries = [];
      if (needNotifs) queries.push(sb.from('coach_notifications').select('*').eq('coach_email', email).order('created_at', { ascending: false }).limit(5));
      else queries.push(Promise.resolve({ data: null }));
      if (needStats) {
        const coachClientEmails = clients.filter(cl => cl.coach_email === email).map(cl => cl.email);
        queries.push(sb.from('coach_sales').select('*').eq('coach_email', email).order('created_at', { ascending: false }));
        if (coachClientEmails.length) {
          queries.push(sb.from('training_plans').select('client_email').in('client_email', coachClientEmails));
          queries.push(sb.from('nutrition_plans').select('client_email').in('client_email', coachClientEmails));
        } else {
          queries.push(Promise.resolve({ data: [] }));
          queries.push(Promise.resolve({ data: [] }));
        }
      }
      const results = await Promise.all(queries);
      if (needNotifs && results[0].data) coachNotifsCache[email] = results[0].data;
      else if (needNotifs) coachNotifsCache[email] = [];
      if (needStats) {
        coachStatsCache[email] = {
          sales:   results[1].data || [],
          trPlans: (results[2].data || []).length,
          nuPlans: (results[3].data || []).length
        };
      }
      renderCoachesTable();
    }
  }

  function openAddCoachModal() {
    document.getElementById('coach-modal').classList.add('open');

    document.getElementById('coach-email-inp').value = '';

  async function addCoach() {
    const name  = document.getElementById('coach-name-inp').value.trim();
    const email = document.getElementById('coach-email-inp').value.trim();
    const role  = document.getElementById('coach-role-inp').value;
    const errEl = document.getElementById('coach-err');
    const btn   = document.getElementById('coach-add-btn');
    errEl.style.display = 'none';
    if (!name || !email) { errEl.textContent = 'יש למלא שם ואימייל'; errEl.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'מוסיף...';
    const { error } = await sb.from('coaches').insert({ name, email, role });
    btn.disabled = false; btn.textContent = 'הוסף';
    if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return; }
    closeCoachModal();
    await loadCoaches();
    renderCoachesTable();
    toast(`${name} נוסף כמאמן ✓`, 'ok');

  async function deleteCoach(id, name) {
    if (!confirm(`למחוק את ${name}? המתאמנים שלו לא יימחקו.`)) return;
    await sb.from('coaches').delete().eq('id', id);
    await loadCoaches();
    renderCoachesTable();
    toast('מאמן נמחק', 'ok');
  }

  async function changeCoachRole(id, role) {
    const { error } = await sbAdmin.from('coaches').update({ role }).eq('id', id);
    if (error) { toast('שגיאה בעדכון דרגה', 'err'); return; }
    const c = coachesList.find(c => c.id === id);
    if (c) c.role = role;
    renderCoachesTable();
    toast('דרגה עודכנה ✓', 'ok');
  }

  async function approveCoach(id, months) {
    const today = new Date().toISOString().split('T')[0];
    const endDate = new Date();
    endDate.setMonth(endDate.getMonth() + months);
    const licEnd = endDate.toISOString().split('T')[0];
    const { error } = await sbAdmin.from('coaches').update({
      role: 'senior', license_start: today, license_end: licEnd
    }).eq('id', id);
    if (error) { toast('שגיאה באישור', 'err'); return; }
    const c = coachesList.find(c => c.id === id);
    if (c) { c.role = 'senior'; c.license_start = today; c.license_end = licEnd; }
    // הענקת טוקנים חודשיים אוטומטית
    await grantCoachTokens(c.email, months * 1000);
    renderCoachesTable();
    toast(`✓ אושר! גישה עד ${licEnd} · נוספו ${months*1000} טוקנים`, 'ok');
  }

  function setCoachLicense(id, months) {
    const endInput = document.getElementById(`lic-end-${id}`);
    const startInput = document.getElementById(`lic-start-${id}`);
    if (!endInput) return;
    const base = (endInput.value && endInput.value >= new Date().toISOString().split('T')[0])
      ? new Date(endInput.value) : new Date();
    base.setMonth(base.getMonth() + months);
    const newEnd = base.toISOString().split('T')[0];
    endInput.value = newEnd;
    if (startInput && !startInput.value) startInput.value = new Date().toISOString().split('T')[0];
  }

  async function saveCoachLicense(id) {
    const startVal = document.getElementById(`lic-start-${id}`)?.value || null;
    const endVal   = document.getElementById(`lic-end-${id}`)?.value || null;
    const { error } = await sbAdmin.from('coaches').update({ license_start: startVal, license_end: endVal }).eq('id', id);
    if (error) { toast('שגיאה בשמירת רישיון', 'err'); return; }
    const c = coachesList.find(c => c.id === id);
    if (c) { c.license_start = startVal; c.license_end = endVal; }
    renderCoachesTable();
    toast('רישיון עודכן ✓', 'ok');
  }

  async function saveCoachInfo(id, oldEmail) {
    const newName  = document.getElementById(`ci-name-${id}`)?.value.trim();
    const newEmail = document.getElementById(`ci-email-${id}`)?.value.trim().toLowerCase();
    if (!newName) { toast('שם לא יכול להיות ריק', 'err'); return; }
    if (!newEmail || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(newEmail)) { toast('מייל לא תקין', 'err'); return; }

    const updates = { name: newName };
    const emailChanged = newEmail !== oldEmail;

    if (emailChanged) {
      const ok = confirm(`שינוי מייל מ-\n${oldEmail}\nל-\n${newEmail}\n\nהשינוי ישפיע על הכניסה למערכת. להמשיך?`);
      if (!ok) return;

      const { data: listData, error: listErr } = await sbAdmin.auth.admin.listUsers({ perPage: 1000 });
      if (listErr) { toast('שגיאה: ' + listErr.message, 'err'); return; }
      const authUser = (listData?.users || []).find(u => u.email === oldEmail);
      if (!authUser) { toast('משתמש לא נמצא ב-Auth — ייתכן שלא נרשם עדיין', 'err'); return; }

      const { error: authErr } = await sbAdmin.auth.admin.updateUserById(authUser.id, { email: newEmail, email_confirm: true });
      if (authErr) { toast('שגיאת Auth: ' + authErr.message, 'err'); return; }
      updates.email = newEmail;
    }

    const { error } = await sbAdmin.from('coaches').update(updates).eq('id', id);
    if (error) { toast('שגיאה: ' + error.message, 'err'); return; }

    const c = coachesList.find(x => x.id === id);
    if (c) { c.name = newName; if (emailChanged) c.email = newEmail; }
    renderCoachesTable();
    toast(`✓ פרטי המאמן עודכנו${emailChanged ? ' (כולל מייל)' : ''}`, 'ok');
  }

  async function grantCoachTokens(email, amount, kind = 'purchase', label = 'רכישת טוקנים') {
    const cur = coachTokensCache[email] ?? 0;
    const newBal = cur + amount;
    const { error } = await sbAdmin.from('coach_tokens')
      .upsert({ coach_email: email, balance: newBal, updated_at: new Date().toISOString() }, { onConflict: 'coach_email' });
    if (error) { console.error('grantCoachTokens error:', error); toast('שגיאה: ' + error.message, 'err'); return; }
    coachTokensCache[email] = newBal;
    // רישום להיסטוריה (amount שלילי = זיכוי/רכישה)
    sbAdmin.from('token_usage').insert({ coach_email: email, amount: -amount, kind, label, balance_after: newBal }).then(()=>{});
    toast(`✓ נוספו ${amount} טוקנים (סה"כ: ${newBal})`, 'ok');
    renderCoachesTable();
  }

  async function setCoachTokensDirect(id, email) {
    const inp = document.getElementById(`tok-inp-${id}`);
    const val = parseInt(inp?.value);
    if (isNaN(val) || val < 0) { toast('הכנס מספר תקין', 'err'); return; }
    const prev = coachTokensCache[email] ?? 0;
    const { error } = await sbAdmin.from('coach_tokens')
      .upsert({ coach_email: email, balance: val, updated_at: new Date().toISOString() }, { onConflict: 'coach_email' });
    if (error) { console.error('setCoachTokensDirect error:', error); toast('שגיאה: ' + error.message, 'err'); return; }
    coachTokensCache[email] = val;
    // רישום להיסטוריה (הפרש מהיתרה הקודמת)
    sbAdmin.from('token_usage').insert({ coach_email: email, amount: (prev - val), kind: 'admin_set', label: 'קביעת יתרה ידנית', balance_after: val }).then(()=>{});
    if (inp) inp.value = '';
    toast(`✓ יתרה קבועה ל-${val} טוקנים`, 'ok');
    renderCoachesTable();
  }

  /* ── TRAINING EDITOR ── */
  function renderTrainingEditor() {
    const el = document.getElementById('training-editor');
    if (!el) return;
    if (!trainingPlan.length) { el.innerHTML = '<div style="color:#444;font-size:0.85rem;padding:8px 0;">אין ימים עדיין — לחץ + הוסף יום</div>'; return; }
    el.innerHTML = trainingPlan.map((day, di) => {
      const activeMuscles = day.muscles || [];
      return `
      <div class="day-block">
        <div class="day-block-head">
          <input value="${esc(day.name || day.day || '')}" oninput="trainingPlan[${di}].name=this.value" placeholder="שם האימון (אימון A, יום חזה + כתפיים...)"/>

          ${MUSCLES_ADMIN.map(m => `<button class="muscle-pill${activeMuscles.includes(m) ? ' muscle-active' : ''}" onclick="toggleMuscle(${di},'${m}',this)">${m}</button>`).join('')}

        <div id="ex-wrap-${di}">
          ${(day.exercises || []).map((ex, ei) => exRow(di, ei, ex)).join('')}
        </div>
        <button class="add-link" onclick="addExercise(${di})">+ הוסף תרגיל</button>
      </div>`;
    }).join('');
    if (dayClipboard) {
      const btn = document.getElementById('btn-paste-day');
      if (btn) { btn.style.display = 'block'; btn.textContent = `📋 הדבק — ${esc(dayClipboard.name || dayClipboard.day || 'יום')}`; }
    }
  }

  function toggleMuscle(di, muscle, btn) {
    if (!trainingPlan[di].muscles) trainingPlan[di].muscles = [];
    const idx = trainingPlan[di].muscles.indexOf(muscle);
    if (idx === -1) { trainingPlan[di].muscles.push(muscle); btn.classList.add('muscle-active'); }
    else { trainingPlan[di].muscles.splice(idx, 1); btn.classList.remove('muscle-active'); }
  }

  function exRow(di, ei, ex) {
    if (!Array.isArray(ex.sets)) ex.sets = parseSetsToArray(ex.sets);
    const sets = ex.sets;
    const total = trainingPlan[di].exercises.length;
    const restOpts = [30,45,60,75,90,105,120,150,180,240,300];
    const curRest = ex.rest_time || 90;
    const restHtml = restOpts.map(s => {
      const lbl = s < 60 ? s + ' שנ׳' : (s % 60 === 0 ? (s/60) + ' דק׳' : Math.floor(s/60) + ':' + (s%60).toString().padStart(2,'0') + ' דק׳');
      return `<option value="${s}" ${curRest === s ? 'selected' : ''}>${lbl}</option>`;
    }).join('');
    return `<div style="margin-bottom:10px;background:rgba(255,255,255,0.02);border-radius:8px;padding:10px 12px;">
      <div class="ex-row" style="margin-bottom:7px;">

          <button onclick="moveExercise(${di},${ei},1)"  ${ei===total-1?'disabled':''} style="padding:2px 6px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:4px;color:${ei===total-1?'#444':'#ccc'};cursor:${ei===total-1?'default':'pointer'};font-size:0.65rem;line-height:1;">▼</button>
        </div>
        <button class="btn-sm btn-red" onclick="removeExercise(${di},${ei})">✕</button>
      </div>
      <div class="sets-coach-wrap">
        <div class="sets-coach-head"><span>סט</span><span style="text-align:center;">ק"ג מומלץ</span><span>טווח חזרות</span><span></span></div>
        ${sets.map((s, si) => `
          <div class="sets-coach-row">
            <span style="font-size:0.8rem;font-weight:700;color:var(--muted);text-align:center;">${si+1}</span>
            <input type="number" step="0.5" min="0" value="${s.recommended_kg||0}" oninput="updateCoachSet(${di},${ei},${si},'recommended_kg',this.value)" placeholder="0"/>
            <div class="sets-coach-range">
              <input type="number" min="1" value="${s.reps_min||8}" oninput="updateCoachSet(${di},${ei},${si},'reps_min',this.value)"/>
              <span>עד</span>
              <input type="number" min="1" value="${s.reps_max||12}" oninput="updateCoachSet(${di},${ei},${si},'reps_max',this.value)"/>
            </div>
            <button onclick="removeCoachSet(${di},${ei},${si})" style="background:none;border:none;color:#555;cursor:pointer;font-size:0.9rem;padding:0;line-height:1;">✕</button>
          </div>`).join('')}
        <button class="btn-add-set" onclick="addCoachSet(${di},${ei})">+ הוסף סט</button>

            <div style="position:absolute;top:3px;${ex.rir_enabled?'right:3px':'left:3px'};width:14px;height:14px;border-radius:50%;background:#fff;transition:all 0.2s;"></div>
          </div>
          <div>
            <div style="font-size:0.8rem;font-weight:700;color:var(--white);">הפעל RIR</div>
            <div style="font-size:0.7rem;color:var(--muted);">תיעוד יעד' חזרות שנשארו ברזרבה (0-5) לכל סט</div>
          </div>
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">

המערכת מכירה רק את הטכניקות הבאות:

### 2. חוקי שימוש בטכניקות
- Isomix / Isomix Advanced / IsoBurst — מבודדים בלבד! אסור בתרגיל מורכב!

### 3. תרגיל מורכב vs. מבודד
מורכב — מערב כמה מפרקים: לחיצות, סקוואט, דדליפט, חתירה, מתח, פולי עליון, היפ טראסט, לחיצה צרה

### 4. פירמידה 5×20/15/12/10/8 — תרגיל מורכב
כל סט — משקל עולה, חזרות יורדות:
- סט 1 (20) = חימום מפרקים, קל, לא לכשל
- סט 2 (15) = התחלת עומס
- סט 3 (12) = אזור היפרטרופיה מרכזי
- סט 4 (10) = כבד, עומס מכני גבוה
- סט 5 (8) = הכי כבד, RIR 1-2
רוב הסטים RIR 1-2. רק הסט האחרון לפעמים עד כשל.

### 5. מבנה Rest Pause (תרגיל מורכב יציב)
עובדים עד כמעט כשל → 10-15 שניות מנוחה → עוד חזרות → אפשר חזרה נוספת.

### 6. מבנה 6 איטי 6 מהיר (תרגיל מורכב)
6 חזרות איטיות (TUT, שליטה, Stretch) + ישר 6 חזרות מהירות (פאמפ, סיבים מהירים).

### 7. מבנה Isomix (מבודד, מכונה/כבל)
כל חזרה = תנועה מלאה + עצירה 3-5 שניות בכיווץ המקסימלי.

### 8. מבנה Isomix Advanced (מבודד, מכונה/כבל)
5 חזרות Hold 5 שניות → 5 חזרות Hold 10 שניות → 5 חזרות Hold 15 שניות.

### 9. מבנה IsoBurst (מבודד, מכונה/כבל — הכי מתקדם)
חוק: משך Hold = מספר חזרות שבוצעו.
סט 1: 15 שניות עבודה + Hold.
סט 2: 60 שניות ÷ 4 חלקים של 15 שניות, Hold אחרי כל חלק.
סט 3: 30 שניות ÷ 2 חלקים, Drop אחרי כל חלק.
סט 4: 45 שניות ÷ 3 חלקים, Drop אחרי כל חלק.

### 10. Drop Set (מבודד)
הורדת משקל ללא מנוחה: 8 / 8 / 8 (הורדה 20% בכל שלב).

### 11. נפח לפי גודל שריר
שרירים גדולים (גב, חזה, רגליים) — עד 20-25 סטים.
שרירים קטנים (ידיים, כתפיים) — עד 12-16 סטים.

### 12. סדר חובה באימון
1. תרגיל מורכב כבד ראשון (סקוואט / דדליפט / לחיצה)

  async function setClientPassword() {
    const phone = document.getElementById('e-phone').value.trim();
    const email = activeEmail;
    if (!phone) { toast('יש להזין מספר טלפון קודם', 'err'); return; }
    const password = phone.replace(/\D/g, '');
    if (password.length < 6) { toast('מספר טלפון קצר מדי (מינימום 6 ספרות)', 'err'); return; }
    if (SERVICE_KEY === 'YOUR_SERVICE_ROLE_KEY_HERE') { toast('יש להכניס SERVICE_KEY בקוד קודם', 'err'); return; }

    const { data: { users }, error: listErr } = await sbAdmin.auth.admin.listUsers({ perPage: 1000 });
    if (listErr) { toast('שגיאה: ' + listErr.message, 'err'); return; }

    const user = users.find(u => u.email === email);
    if (user) {
      const { error } = await sbAdmin.auth.admin.updateUserById(user.id, { password });
      if (error) { toast('שגיאה בעדכון סיסמה: ' + error.message, 'err'); return; }
    } else {
      const { error } = await sbAdmin.auth.admin.createUser({ email, password, email_confirm: true });
      if (error) { toast('שגיאה ביצירת משתמש: ' + error.message, 'err'); return; }
    }
    toast(`✓ סיסמה הוגדרה: ${password}`, 'ok');
  }

    const email = document.getElementById('new-email').value.trim();
    const start = document.getElementById('new-start').value;
    const end   = document.getElementById('new-end').value;

  function toggleItemAlt(mi, ii) {

  function addAlt(mi, ii, foodId, foodName) {
    const item = nutritionPlan[mi].items[ii];
    if (!item.alternatives) item.alternatives = [];
    if (!item.alternatives.some(a => a.name === foodName))
      item.alternatives.push({ food_id: foodId, name: foodName });
    hideAltSuggAdmin();
    renderNutritionEditor();
  }
  function removeAlt(mi, ii, ai) {
    nutritionPlan[mi].items[ii].alternatives.splice(ai, 1);
    renderNutritionEditor();
  }

  function swapItemWithAlt(mi, ii, foodId, foodName, eqG) {
    const af = findFood(foodName) || (foodId ? allFoodItems.find(f => f.id === foodId) : null);
    if (!af || !af.calories) { toast('המזון לא נמצא במאגר הנתונים', 'err'); return; }
    const item = nutritionPlan[mi].items[ii];
    const r = eqG / 100;
    item.food     = af.name;
    item.quantity = eqG + 'g';
    item._qty     = eqG;
    item._unit    = 'גרם';
    item.calories = Math.round(af.calories * r);
    item.protein  = Math.round(af.protein  * r * 10) / 10;
    item.carbs    = Math.round(af.carbs    * r * 10) / 10;
    item.fat      = Math.round(af.fat      * r * 10) / 10;
    item._altOpen = false;
    renderNutritionEditor();
    toast(`✓ הוחלף ב-${af.name} (${eqG}g)`, 'ok');
  }

  function swapMealChip(mi, foodName, category) {
    const meal  = nutritionPlan[mi];
    const items = meal.items || [];
    const af    = findFood(foodName);
    if (!af || !af.calories) { toast('המזון לא נמצא במאגר: ' + foodName, 'err'); return; }
    let targetIdx = 0, maxVal = -1;
    items.forEach((item, i) => {
      const val = category === 'protein' ? (+item.protein||0)
                : category === 'carbs'   ? (+item.carbs||0)
                :                          (+item.fat||0);
      if (val > maxVal) { maxVal = val; targetIdx = i; }
    });
    if (!items[targetIdx]) return;
    const eqG = Math.round((items[targetIdx].calories || 100) / af.calories * 100);
    swapItemWithAlt(mi, targetIdx, af.id, af.name, eqG);
  }
  function showAltSuggAdmin(input, mi, ii) {
    hideAltSuggAdmin();
    const q    = input.value.trim();
    const item = (nutritionPlan[mi]?.items || [])[ii];
    const meal = nutritionPlan[mi];
    const iCal = +(item?.calories || 0);

    /* dominant macro of this item */
    const p = +(item?.protein||0)*4, c = +(item?.carbs||0)*4, f = +(item?.fat||0)*9;
    const cat = (p >= c && p >= f) ? 'protein' : (c >= f ? 'carbs' : 'fat');
    const isLightMeal = /בוקר|ערב|לילה/.test(meal?.meal || '');
    const currentFoodName = item?.food || item?.name || '';
    const all = getMergedFoodList();
    let matches;

    if (!q) {
      /* ── Smart defaults when input is empty ── */
      if (isLightMeal && cat === 'protein') {
        /* Breakfast/evening/late → prefer GO + airy protein snacks */
        const LIGHT = ['מעדן GO','מעדן חלבון','קוטג\'','יוגורט יווני','גבינה לבנה','ביצה שלמה','חלבון ביצה'];
        matches = all.filter(fd => fd.name !== currentFoodName && LIGHT.some(k => fd.name.includes(k)));
        if (matches.length < 6) {
          const extra = all
            .filter(fd => fd.name !== currentFoodName && (fd.protein||0) > 8 && !matches.includes(fd))
            .map(fd => ({...fd, _s: macroScore(item, fd)}))
            .filter(fd => fd._s > 0.35)
            .sort((a,b) => b._s - a._s)
            .slice(0, 7 - matches.length);
          matches = [...matches, ...extra];
        }
      } else {
        /* Same macro category, sorted by macro similarity then calorie proximity */
        matches = all
          .filter(fd => {
            if (fd.name === currentFoodName) return false;
            if (cat === 'protein') return (fd.protein||0) > 10;
            if (cat === 'carbs')   return (fd.carbs||0)   > 20;
            return                        (fd.fat||0)      > 10;
          })
          .map(fd => ({...fd, _s: macroScore(item, fd)}))
          .filter(fd => fd._s > 0.35)
          .sort((a,b) => b._s - a._s)
          .slice(0, 7);
      }
    } else {
      /* Search by name, rank by macro similarity */
      matches = all
        .filter(fd => fd.name !== currentFoodName && fd.name.includes(q))
        .map(fd => ({...fd, _s: macroScore(item, fd)}))
        .sort((a,b) => b._s - a._s)
        .slice(0, 7);
    }

    const drop = document.getElementById(`alt-sugg-${mi}-${ii}`);
    if (!drop || !matches.length) return;
    drop.innerHTML = '';
    drop.style.display = 'block';
    matches.forEach(fd => {
      const el = document.createElement('div');
      el.style.cssText = 'padding:8px 12px;cursor:pointer;font-size:0.82rem;border-bottom:1px solid rgba(255,255,255,0.04);color:#fff;display:flex;align-items:center;gap:8px;';
      const eqQty = iCal
        ? (formatChipQty(fd.name, iCal) || (Math.round(iCal / fd.calories * 100) + 'g'))
        : '';
      const pct = Math.round((fd._s||0)*100);
      el.innerHTML = `<span style="font-weight:700;flex:1;">${esc(fd.name)}</span>${eqQty?`<span style="color:var(--orange);font-size:0.78rem;font-weight:700;">${eqQty}</span>`:''}<span style="color:#555;font-size:0.7rem;">${pct?pct+'%':''}</span>`;
      el.onmouseover = () => el.style.background = 'rgba(255,107,0,0.08)';
      el.onmouseout  = () => el.style.background = '';
      el.onmousedown = () => addAlt(mi, ii, fd.id, fd.name);
      drop.appendChild(el);
    });
  }

  async function addExercisesWithAI() {
    const prompt = document.getElementById('ai-ex-prompt').value.trim();
    const statusEl = document.getElementById('ai-ex-status');
    const btn = document.getElementById('ai-ex-btn');
    if (!prompt) { statusEl.style.color='#ff7070'; statusEl.textContent='יש לתאר מה להוסיף'; return; }
    btn.disabled = true; btn.textContent = '⏳ עובד...';
    statusEl.style.color = 'var(--muted)'; statusEl.textContent = '';

    // זיהוי פקודת איפוס
    const isReset = /אפס|מחק הכל|נקה הכל|רשימה חדשה|התחל מחדש|clear|reset/i.test(prompt);
    try {
      if (isReset) {
        statusEl.textContent = 'מוחק את כל התרגילים...';
        const { error: delErr } = await sb.from('exercises').delete().not('id', 'is', null);
        if (delErr) throw new Error(delErr.message);
        allAdminExercises = [];
        renderExTable();
        statusEl.style.color = '#70dd70';
        statusEl.textContent = '✓ המאגר אופס בהצלחה';
        btn.disabled = false; btn.textContent = '✨ הוסף למאגר';
        return;
      }

      statusEl.textContent = 'Claude בונה רשימה...';
      const res = await aiFetch('', {
        method: 'POST',
        headers: { 'Content-Type':'application/json','x-api-key':CLAUDE_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 4096,
          messages: [{ role: 'user', content: _withFile(
`החזר JSON array בלבד. אל תוסיף שום טקסט מחוץ ל-[...].

⚠️ חוק ראשון: הוסף אך ורק תרגילים שקשורים ישירות לבקשה. אסור להוסיף תרגילים אחרים.
בקשה: "${prompt}"

ערכים חוקיים בלבד:
muscle_group: חזה | גב | כתפיים | יד קדמית | יד אחורית | אמות | 4 ראשי | המסטרינג | ישבן | עגל | ליבה
equipment: משקל גוף | בר / מוט | משקולות | כבל | מכונה | סמיט | TRX / רצועות | קטלבל
difficulty: מתחיל | ביניים | מתקדם | כל הרמות

[{"name":"שם בעברית","muscle_group":"חזה","sub_muscle_group":"חזה עליון","equipment":"בר / מוט","difficulty":"ביניים"}]`, _pendingExFile) }]
        })
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
      const data = await res.json();
      const raw = data.content[0].text.trim().replace(/```json\s*/gi,'').replace(/```/g,'').trim();
      const match = raw.match(/\[[\s\S]*\]/);
      if (!match) throw new Error('המודל לא החזיר JSON תקין — נסה שוב');
      const parsed = JSON.parse(match[0]);
      const VALID_MG = ['חזה','גב','כתפיים','יד קדמית','יד אחורית','אמות','4 ראשי','המסטרינג','ישבן','עגל','ליבה'];
      const VALID_EQ = ['משקל גוף','בר / מוט','משקולות','כבל','מכונה','סמיט','TRX / רצועות','קטלבל'];
      const VALID_DI = ['מתחיל','ביניים','מתקדם','כל הרמות'];
      const exercises = parsed.filter(e => e.name && typeof e.name === 'string').map(e => ({
        name: String(e.name).trim(),
        muscle_group: VALID_MG.includes(e.muscle_group) ? e.muscle_group : VALID_MG.find(g => String(e.muscle_group||'').includes(g)) || 'ליבה',
        sub_muscle_group: String(e.sub_muscle_group || '').trim(),
        equipment: VALID_EQ.includes(e.equipment) ? e.equipment : 'מכונה',
        difficulty: VALID_DI.includes(e.difficulty) ? e.difficulty : 'ביניים',
      }));
      if (!exercises.length) throw new Error('רשימה ריקה');

      const { error } = await sb.from('exercises').insert(exercises);
      if (error) throw new Error(error.message);

      await loadExercises();
      renderExTable();
      statusEl.style.color = '#70dd70';
      statusEl.textContent = `✓ ${exercises.length} תרגילים נוספו`;
    } catch(e) {
      statusEl.style.color = '#ff7070';
      statusEl.textContent = 'שגיאה: ' + e.message;
    }
    btn.disabled = false; btn.textContent = '✨ הוסף למאגר';
  }

    ['fi-name','fi-cal','fi-prot','fi-carb','fi-fat'].forEach(id => document.getElementById(id).value='');
    document.getElementById('fi-cat').value = 'כללי';
    document.getElementById('fi-err').style.display='none';
    document.getElementById('fi-modal').classList.add('open');
  }

  function openEditFiModal(id) {
    const f = allFoodItems.find(x => String(x.id)===String(id));
    if (!f) return;
    editingFiId = id;
    document.getElementById('fi-modal-title').textContent='ערוך';
    document.getElementById('fi-name').value = f.name || '';
    document.getElementById('fi-cat').value  = f.category || 'כללי';
    document.getElementById('fi-cal').value  = f.calories || '';
    document.getElementById('fi-prot').value = f.protein  || '';
    document.getElementById('fi-carb').value = f.carbs    || '';
    document.getElementById('fi-fat').value  = f.fat      || '';
    document.getElementById('fi-err').style.display='none';
    document.getElementById('fi-modal').classList.add('open');
  }

  function closeFiModal() { document.getElementById('fi-modal').classList.remove('open'); }

  async function saveFoodItem() {
    const name = document.getElementById('fi-name').value.trim();
    const errEl = document.getElementById('fi-err');
    const btn   = document.getElementById('fi-save-btn');
    errEl.style.display='none';
    if (!name) { errEl.textContent='יש להזין שם מאכל'; errEl.style.display='block'; return; }
    const payload = {
      name,
      category: document.getElementById('fi-cat').value || 'כללי',
      calories: parseFloat(document.getElementById('fi-cal').value)  || 0,
      protein:  parseFloat(document.getElementById('fi-prot').value) || 0,
      carbs:    parseFloat(document.getElementById('fi-carb').value) || 0,
      fat:      parseFloat(document.getElementById('fi-fat').value)  || 0,
    };
    btn.disabled=true; btn.textContent='שומר...';
    let error;
    if (editingFiId) { ({ error } = await sb.from('food_items').update(payload).eq('id', editingFiId)); }
    else             { ({ error } = await sb.from('food_items').insert(payload)); }
    btn.disabled=false; btn.textContent='שמור';
    if (error) { errEl.textContent=error.message; errEl.style.display='block'; return; }
    closeFiModal();
    await loadFoodItems();
    renderFiTable();
    toast(editingFiId ? 'מאכל עודכן ✓' : 'מאכל נוסף ✓', 'ok');
  }

  async function addFoodWithAI() {
    const prompt = document.getElementById('ai-fi-prompt').value.trim();
    const statusEl = document.getElementById('ai-fi-status');
    const btn = document.getElementById('ai-fi-btn');
    if (!prompt) { statusEl.style.color='#ff7070'; statusEl.textContent='יש לתאר מה להוסיף'; return; }
    btn.disabled = true; btn.textContent = '⏳ עובד...';
    statusEl.style.color = 'var(--muted)'; statusEl.textContent = '';

    // זיהוי פקודת איפוס
    const isReset = /אפס|מחק הכל|נקה הכל|רשימה חדשה|התחל מחדש|clear|reset/i.test(prompt);
    try {
      if (isReset) {
        statusEl.textContent = 'מוחק את כל המאכלים...';
        const { error: delErr } = await sb.from('food_items').delete().not('id', 'is', null);
        if (delErr) throw new Error(delErr.message);
        allFoodItems = [];
        renderFiTable();
        statusEl.style.color = '#70dd70';
        statusEl.textContent = '✓ המאגר אופס בהצלחה';
        btn.disabled = false; btn.textContent = '✨ הוסף למאגר';
        return;
      }

      statusEl.textContent = 'Claude בונה רשימה...';
      const res = await aiFetch('', {
        method: 'POST',
        headers: { 'Content-Type':'application/json','x-api-key':CLAUDE_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 4096,
          messages: [{ role: 'user', content: _withFile(
`החזר JSON array בלבד. אל תוסיף שום טקסט מחוץ ל-[...].

⚠️ חוק ראשון: הוסף אך ורק מאכלים שקשורים ישירות לבקשה. אסור להוסיף מאכלים אחרים.
בקשה: "${prompt}"

כל שדה חייב להיות מספר (לא מחרוזת), ערכים לכל 100 גרם, מדויקים תזונתית.
שדה category חייב להיות אחד מ: בשרי, חלבי, פרווה, מקור חלבון, מקור פחמימה, מקור שומן, ירקות, פירות, ג'אנק פוד, כללי
[{"name":"שם בעברית","calories":165,"protein":31,"carbs":0,"fat":3.6,"category":"מקור חלבון"}]`, _pendingFiFile) }]
        })
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
      const data = await res.json();
      const raw = data.content[0].text.trim().replace(/```json\s*/gi,'').replace(/```/g,'').trim();
      const match = raw.match(/\[[\s\S]*\]/);
      if (!match) throw new Error('המודל לא החזיר JSON תקין — נסה שוב');
      const parsed = JSON.parse(match[0]);
      const VALID_CATS = ['בשרי','חלבי','פרווה','מקור חלבון','מקור פחמימה','מקור שומן','ירקות','פירות',"ג'אנק פוד",'כללי'];
      const foods = parsed.filter(f => f.name && typeof f.name === 'string').map(f => ({
        name:     String(f.name).trim(),
        calories: parseFloat(f.calories) || 0,
        protein:  parseFloat(f.protein)  || 0,
        carbs:    parseFloat(f.carbs)    || 0,
        fat:      parseFloat(f.fat)      || 0,
        category: VALID_CATS.includes(f.category) ? f.category : 'כללי',
      }));
      if (!foods.length) throw new Error('רשימה ריקה');
      const { error } = await sb.from('food_items').insert(foods);
      if (error) throw new Error(error.message);
      await loadFoodItems();
      renderFiTable();
      statusEl.style.color = '#70dd70';
      statusEl.textContent = `✓ ${foods.length} מאכלים נוספו`;
    } catch(e) {
      statusEl.style.color = '#ff7070';
      statusEl.textContent = 'שגיאה: ' + e.message;
    }
    btn.disabled = false; btn.textContent = '✨ הוסף למאגר';
  }

  async function deleteFoodItem(id) {
    if (!confirm('למחוק מאכל זה?')) return;
    const { error } = await sb.from('food_items').delete().eq('id', id);
    if (error) { toast('שגיאה במחיקה','err'); return; }
    await loadFoodItems();
    renderFiTable();
    toast('מאכל נמחק','ok');
  }

  /* ── RECORDS ── */
  function buildRecordExercises() {
    const map = {};
    exerciseLibrary.filter(e => e.compound).forEach(e => {
      const mg = e.muscle_group || 'אחר';
      if (!map[mg]) map[mg] = [];
      if (!map[mg].includes(e.name)) map[mg].push(e.name);
    });
    return map;
  }

  function normalizeExName(n) {
    return (n || '').trim().toLowerCase()
      .replace(/\s+מכונה$/,'').replace(/\s+מישן$/,'').replace(/\s+מאשין$/,'')
      .replace(/\bמכונה\b/g,'').replace(/\bסמיט\b/g,'סמית').replace(/\bsmith\b/g,'סמית')
      .replace(/\s+/g,' ').trim();
  }
  const MEDALS = ['🥇','🥈','🥉'];

  let recMode     = 'strength';
  let recMuscle   = null;
  let recExercise = null;
  let recLogs     = null;
  let recClients  = {};
  let recSteps    = [];

  function calc1RM(w, r) {
    w = parseFloat(w); r = parseInt(r);
    if (!w || !r || r <= 0) return 0;
    return Math.round(w * (1 + r / 30) * 10) / 10;
  }

  async function openRecords() {
    document.getElementById('records-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    if (recLogs !== null) { renderRecBody(); return; }
    document.getElementById('rec-body').innerHTML = '<div style="text-align:center;padding:40px;color:#444;">טוען נתונים...</div>';
    const today = new Date().toISOString().split('T')[0];
    const [{ data: logs }, { data: cls }, { data: steps }] = await Promise.all([
      sb.from('workout_logs').select('client_email,log_date,exercises'),
      sb.from('clients').select('email,name'),
      sb.from('steps_logs').select('client_email,steps').eq('log_date', today)
    ]);
    recLogs  = logs || [];
    recSteps = steps || [];
    (cls || []).forEach(c => { recClients[c.email] = c.name || c.email.split('@')[0]; });
    // הוסף תרגילים שמופיעים ב-logs לספריה אם חסרים
    const inLogs = new Set();
    recLogs.forEach(log => { (log.exercises||[]).forEach(ex => { if(ex.name && (ex.sets||[]).some(s=>s.weight&&s.reps)) inLogs.add(ex.name); }); });
    inLogs.forEach(name => {
      if (!exerciseLibrary.find(e => e.name === name)) {
        exerciseLibrary.push({ name, muscle_group: 'אחר', compound: true });
      } else {
        const e = exerciseLibrary.find(e2 => e2.name === name);
        if (!e.compound) e.compound = true;
      }
    });
    const rec = buildRecordExercises();
    const muscles = Object.keys(rec);
    if (muscles.length && !recMuscle) {
      recMuscle   = muscles[0];
      recExercise = rec[recMuscle][0] || null;
    }
    renderRecBody();
  }

  function closeRecords() {
    document.getElementById('records-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function renderRecBody() {
    const body = document.getElementById('rec-body');
    const modeTabs = `
      <div class="rec-mode-tabs">
        <button class="rec-tab${recMode==='strength'?' active':''}" onclick="setRecMode('strength')">💪 שיאי כוח</button>
        <button class="rec-tab${recMode==='steps'?' active':''}" onclick="setRecMode('steps')">🚶 צעדים יומיים</button>
      </div>`;

    if (recMode === 'steps') {
      const today = new Date().toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});
      const myS   = recSteps.find(s => s.client_email === ADMIN);
      const top   = [...recSteps].sort((a,b) => b.steps - a.steps).slice(0,10);
      body.innerHTML = modeTabs + `
        <div style="font-size:0.8rem;color:var(--muted);margin-bottom:14px;">📅 היום — ${today}</div>
        <div class="steps-row">
          <input class="steps-input" type="number" id="steps-inp" min="0" placeholder="כמה צעדים עשית היום?"
            value="${myS ? myS.steps : ''}"/>
          <button class="btn-save-steps" onclick="logSteps()">שמור</button>
        </div>
        ${top.length ? `<div class="podium">${top.map((s,i)=>`
          <div class="podium-row${i<3?' rank-'+(i+1):''}">
            <div class="podium-medal">${i<3?MEDALS[i]:'#'+(i+1)}</div>
            <div class="podium-info"><div class="podium-name">${esc(recClients[s.client_email]||s.client_email.split('@')[0])}</div></div>
            <div class="podium-orm">${Number(s.steps).toLocaleString()} צעדים</div>
          </div>`).join('')}</div>`
        : '<div class="no-records">אף מתאמן לא רשם צעדים היום עדיין 🚶</div>'}
        ${myS ? `<div class="my-rec-box">👤 הצעדים שלי היום: <strong>${Number(myS.steps).toLocaleString()}</strong></div>` : ''}`;
      return;
    }

    const rec = buildRecordExercises();
    const muscles = Object.keys(rec);
    if (!muscles.length) {
      body.innerHTML = modeTabs + '<div class="no-records">אין תרגילים מורכבים במאגר — סמן תרגילים כ"מורכב" בניהול תרגילים</div>';
      return;
    }
    if (!recMuscle || !rec[recMuscle]) { recMuscle = muscles[0]; recExercise = rec[recMuscle][0] || null; }
    if (!recExercise || !(rec[recMuscle]||[]).includes(recExercise)) recExercise = (rec[recMuscle]||[])[0] || null;
    const board = buildExBoard(recExercise);
    body.innerHTML = modeTabs + `
      <div class="muscle-tabs">
        ${muscles.map(m =>
          `<button class="m-tab${m===recMuscle?' active':''}" onclick="setRecMuscle('${m}')">${m}</button>`
        ).join('')}
      </div>
      <select class="ex-select" onchange="setRecEx(this.value)">
        ${(rec[recMuscle]||[]).map(ex =>
          `<option value="${ex}"${ex===recExercise?' selected':''}>${ex}</option>`
        ).join('')}
      </select>
      ${board.length ? `<div class="podium">${board.map((e,i)=>`
        <div class="podium-row rank-${i+1}">
          <div class="podium-medal">${MEDALS[i]}</div>
          <div class="podium-info">
            <div class="podium-name">${esc(e.name)}</div>
            <div class="podium-stats">${e.weight} ק"ג × ${e.reps} חזרות · ${e.date}</div>
          </div>
          <div class="podium-orm">1RM: ${e.orm}</div>
        </div>`).join('')}</div>`
      : '<div class="no-records">אין תוצאות עדיין לתרגיל זה 💪</div>'}`;
  }

  function buildExBoard(exName) {
    if (!exName) return [];
    const normTarget = normalizeExName(exName);
    const best = {};
    recLogs.forEach(log => {
      (log.exercises||[]).forEach(ex => {
        if (normalizeExName(ex.name) !== normTarget) return;
        (ex.sets||[]).forEach(set => {
          const orm = calc1RM(set.weight, set.reps);
          if (!orm) return;
          const cur = best[log.client_email];
          if (!cur || orm > cur.orm || (orm===cur.orm && parseFloat(set.weight)>cur.weight) || (orm===cur.orm && parseFloat(set.weight)===cur.weight && log.log_date>cur.date)) {
            best[log.client_email] = { name: recClients[log.client_email]||log.client_email.split('@')[0], weight: parseFloat(set.weight), reps: parseInt(set.reps), orm, date: log.log_date };
          }
        });
      });
    });
    return Object.values(best).sort((a,b)=>b.orm-a.orm||b.weight-a.weight||b.date.localeCompare(a.date)).slice(0,3);
  }

  function setRecMode(m)   { recMode=m; renderRecBody(); }
  function setRecMuscle(m) { recMuscle=m; const rec=buildRecordExercises(); recExercise=(rec[m]||[])[0]||null; renderRecBody(); }
  function setRecEx(ex)    { recExercise=ex; renderRecBody(); }

  async function logSteps() {
    const val = parseInt(document.getElementById('steps-inp').value);
    if (!val || val < 0) return;
    const today = new Date().toISOString().split('T')[0];
    const btn = document.querySelector('.btn-save-steps');
    btn.disabled = true; btn.textContent = 'שומר...';
    const { error } = await sb.from('steps_logs').upsert(
      { client_email: ADMIN, steps: val, log_date: today },
      { onConflict: 'client_email,log_date' }
    );
    btn.disabled = false; btn.textContent = 'שמור';
    if (error) { toast('שגיאה בשמירה', 'err'); return; }
    const idx = recSteps.findIndex(s => s.client_email === ADMIN);
    if (idx >= 0) recSteps[idx].steps = val; else recSteps.push({ client_email: ADMIN, steps: val });
    renderRecBody();
  }

  /* ══════════════════════════════════════════════════════
     DATABASE SETUP — צור טבלאות חדשות
  ══════════════════════════════════════════════════════ */
  const DB_SETUP_SQL = `
-- Feature 4: White Label Branding (add columns to coaches)
ALTER TABLE coaches ADD COLUMN IF NOT EXISTS logo_url  text;
ALTER TABLE coaches ADD COLUMN IF NOT EXISTS cover_url text;
ALTER TABLE coaches ADD COLUMN IF NOT EXISTS brand_color text;
ALTER TABLE coaches ADD COLUMN IF NOT EXISTS tagline text;

-- Storage bucket for coach assets (run in Supabase Storage UI or via API)
-- Bucket name: coach-assets | Public: true | Max size: 5MB

-- Feature 1: Cycle Management
CREATE TABLE IF NOT EXISTS cycles (
  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  client_email text NOT NULL UNIQUE,
  coach_email text NOT NULL,
  status text NOT NULL DEFAULT 'natural',
  goal text DEFAULT 'general',
  details text DEFAULT '',
  start_date date,
  updated_at timestamptz DEFAULT now(),
  created_at timestamptz DEFAULT now()
);
ALTER TABLE cycles ENABLE ROW LEVEL SECURITY;
CREATE POLICY IF NOT EXISTS "auth_read_own_cycle" ON cycles FOR SELECT
  USING (auth.jwt()->>'email' = client_email OR auth.jwt()->>'email' = coach_email);
CREATE POLICY IF NOT EXISTS "service_manage_cycles" ON cycles FOR ALL USING (true);

CREATE TABLE IF NOT EXISTS cycle_history (
  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  client_email text NOT NULL,
  coach_email text NOT NULL,
  status text NOT NULL,
  goal text,
  details text,
  start_date date,
  end_date timestamptz DEFAULT now(),
  created_at timestamptz DEFAULT now()
);
ALTER TABLE cycle_history ENABLE ROW LEVEL SECURITY;
CREATE POLICY IF NOT EXISTS "service_manage_cycle_history" ON cycle_history FOR ALL USING (true);

-- Feature 2: Progress Tracking
CREATE TABLE IF NOT EXISTS progress_entries (
  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  client_email text NOT NULL,
  coach_email text NOT NULL,
  date date NOT NULL,
  weight numeric(5,2),
  body_fat_pct numeric(5,2),
  notes text,
  created_at timestamptz DEFAULT now(),
  UNIQUE(client_email, date)
);
ALTER TABLE progress_entries ENABLE ROW LEVEL SECURITY;
CREATE POLICY IF NOT EXISTS "auth_read_own_progress" ON progress_entries FOR SELECT
  USING (auth.jwt()->>'email' = client_email OR auth.jwt()->>'email' = coach_email);
CREATE POLICY IF NOT EXISTS "auth_insert_own_progress" ON progress_entries FOR INSERT
  WITH CHECK (auth.jwt()->>'email' = client_email);
CREATE POLICY IF NOT EXISTS "auth_update_own_progress" ON progress_entries FOR UPDATE
  USING (auth.jwt()->>'email' = client_email);
CREATE POLICY IF NOT EXISTS "service_manage_progress" ON progress_entries FOR ALL USING (true);
`;

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">

        <button onclick="this.closest('#db-setup-modal').remove()" style="background:rgba(255,255,255,0.07);border:none;color:#888;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;">✕</button>
      </div>
      <div style="font-size:0.82rem;color:var(--muted);margin-bottom:12px;line-height:1.6;">הרץ את ה-SQL הבא בדשבורד של Supabase → SQL Editor</div>
      <textarea onclick="this.select()" style="width:100%;height:300px;background:#0e0e0e;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#4ade80;font-family:monospace;font-size:0.78rem;padding:14px;resize:vertical;outline:none;direction:ltr;">${DB_SETUP_SQL.trim()}</textarea>
      <div style="margin-top:12px;display:flex;gap:8px;">
        <button onclick="navigator.clipboard.writeText(document.querySelector('#db-setup-modal textarea').value).then(()=>{this.textContent='✓ הועתק!';setTimeout(()=>this.textContent='📋 העתק SQL',2000)})" style="padding:9px 18px;background:var(--orange);border:none;border-radius:8px;color:#fff;font-family:Heebo,sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;">📋 העתק SQL</button>
        <a href="https://app.supabase.com" target="_blank" style="padding:9px 18px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-family:Heebo,sans-serif;font-size:0.88rem;font-weight:700;text-decoration:none;">פתח Supabase ↗</a>
      </div>
    </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  }

  init();

</script>
