<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a0a0a'/><text x='16' y='23' font-family='Arial Black,sans-serif' font-size='15' font-weight='900' fill='%23FF6B00' text-anchor='middle'>HF</text></svg>"/>
  <title>פאנל ניהול — HF Coaching</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange:#FF6B00; --gold:#FFD700; --black:#090909; --graphite:#111; --white:#fff; --muted:#888; --card:rgba(255,255,255,0.04); --border:rgba(255,107,0,0.25); }
    body { font-family: 'Heebo', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: #0e0e0e; } ::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 3px; }

    /* TOP NAV */
    .topnav {
      height: 58px; background: rgba(9,9,9,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,107,0,0.15);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; position: sticky; top: 0; z-index: 100;
    }
    .topnav-brand { font-size: 1.2rem; font-weight: 900; background: linear-gradient(135deg, var(--orange), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .topnav-sub { font-size: 0.75rem; color: var(--muted); }
    .btn-sm {
      padding: 7px 16px; border-radius: 6px; font-family: 'Heebo', sans-serif;
      font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: background 0.2s, opacity 0.2s;
    }
    .btn-outline { background: transparent; border: 1px solid rgba(255,107,0,0.4); color: var(--orange); }
    .btn-outline:hover { background: rgba(255,107,0,0.1); }
    .btn-orange { background: linear-gradient(135deg, var(--orange), #FF8C00); border: none; color: var(--white); }
    .btn-orange:hover { opacity: 0.88; }
    .btn-orange:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-red { background: transparent; border: 1px solid rgba(255,60,60,0.35); color: #ff7070; font-size: 0.78rem; padding: 4px 10px; }
    .btn-red:hover { background: rgba(255,60,60,0.1); }

    /* LAYOUT */
    .layout { display: flex; min-height: calc(100vh - 58px); }

    /* SIDEBAR */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: rgba(255,255,255,0.02); border-left: 1px solid rgba(255,255,255,0.06);
      display: flex; flex-direction: column;
    }
    .sidebar-head {
      padding: 16px 14px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-title { font-size: 0.78rem; font-weight: 700; color: var(--muted); letter-spacing: 1px; }
    .client-list { flex: 1; overflow-y: auto; }
    .client-item {
      padding: 12px 14px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .client-item:hover { background: rgba(255,107,0,0.06); }
    .client-item.active { background: rgba(255,107,0,0.1); border-right: 3px solid var(--orange); }
    .client-item-name { font-size: 0.9rem; font-weight: 700; }
    .client-item-email { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    /* MAIN */
    .main { flex: 1; overflow-y: auto; padding: 24px 28px 60px; }
    .no-select { display: flex; align-items: center; justify-content: center; height: 300px; color: #333; font-size: 1rem; }

    /* SECTION CARD */
    .sec-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px 22px; margin-bottom: 24px;
    }
    .sec-card-title {
      font-size: 1rem; font-weight: 900; color: var(--white);
      margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between;
    }
    .sec-card-title span { color: var(--orange); }

    /* FORM GRID */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-grid.cols-1 { grid-template-columns: 1fr; }
    @media (max-width: 600px) { .form-grid, .form-grid.cols-3 { grid-template-columns: 1fr; } }
    .f-group { display: flex; flex-direction: column; gap: 5px; }
    .f-group label { font-size: 0.77rem; font-weight: 700; color: var(--muted); }
    .f-group input, .f-group select {
      padding: 9px 12px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 7px;
      color: var(--white); font-family: 'Heebo', sans-serif; font-size: 0.88rem;
      outline: none; transition: border-color 0.2s;
    }
    .f-group input:focus, .f-group select:focus { border-color: var(--orange); }
    .f-group select option { background: #1a1a1a; }

    /* TRAINING EDITOR */
    .day-block { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
    .day-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .day-block-head input { flex: 1; padding: 7px 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: var(--white); font-family: 'Heebo', sans-serif; font-size: 0.88rem; outline: none; }
    .day-block-head input:focus { border-color: var(--orange); }
    .muscle-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 12px; }
    .muscle-pill { padding: 5px 12px; border-radius: 20px; font-family: 'Heebo', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; white-space: nowrap; border: 1px solid rgba(255,255,255,0.12); background: transparent; color: var(--muted); transition: all 0.15s; }
    .muscle-pill:hover { border-color: rgba(255,107,0,0.4); color: var(--white); }
    .muscle-pill.muscle-active { background: rgba(255,107,0,0.15); border-color: var(--orange); color: var(--orange); }
    .ex-row { display: grid; grid-template-columns: 2fr 1fr 3fr auto; gap: 8px; align-items: center; margin-bottom: 7px; }
    .ex-row input { padding: 7px 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: var(--white); font-family: 'Heebo', sans-serif; font-size: 0.82rem; outline: none; }
    .ex-row input:focus { border-color: rgba(255,107,0,0.5); }
    .ex-row input::placeholder { color: #444; }
    @media (max-width: 640px) { .ex-row { grid-template-columns: 1fr 1fr; } }
    .add-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.8rem; font-weight: 700; color: var(--orange);
      background: none; border: none; cursor: pointer; padding: 4px 0;
      transition: opacity 0.2s; font-family: 'Heebo', sans-serif;
    }
    .add-link:hover { opacity: 0.7; }

    /* NUTRITION EDITOR */
    .meal-block { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
    .meal-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .meal-block-head input { flex: 1; padding: 7px 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: var(--white); font-family: 'Heebo', sans-serif; font-size: 0.88rem; outline: none; }
    .meal-block-head input:focus { border-color: var(--orange); }
    .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr auto; gap: 6px; align-items: center; margin-bottom: 6px; }
    .item-row input { padding: 6px 8px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: var(--white); font-family: 'Heebo', sans-serif; font-size: 0.8rem; outline: none; text-align: center; }
    .item-row input:first-child { text-align: right; }
    .item-row input:focus { border-color: rgba(255,107,0,0.5); }
    .item-row input::placeholder { color: #444; font-size: 0.72rem; }
    @media (max-width: 640px) { .item-row { grid-template-columns: 1fr 1fr 1fr; } }
    .nutri-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr auto; gap: 6px; margin-bottom: 6px; }
    .nutri-header span { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-align: center; padding: 0 2px; }
    .nutri-header span:first-child { text-align: right; }

    /* MODAL */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-bg.open { display: flex; }
    .modal { background: #151515; border: 1px solid rgba(255,107,0,0.35); border-radius: 16px; padding: 28px; width: 100%; max-width: 440px; box-shadow: 0 0 60px rgba(255,107,0,0.15); }
    .modal h3 { font-size: 1.1rem; font-weight: 900; margin-bottom: 20px; }
    .modal h3 span { color: var(--orange); }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 22px; border-radius: 8px; font-size: 0.88rem; font-weight: 700;
      z-index: 999; transition: opacity 0.3s; opacity: 0; pointer-events: none;
    }
    .toast.ok  { background: rgba(60,200,60,0.15); border: 1px solid rgba(60,200,60,0.4); color: #70dd70; }
    .toast.err { background: rgba(255,60,60,0.15); border: 1px solid rgba(255,60,60,0.4); color: #ff7070; }
    .toast.show { opacity: 1; }

    /* LOADER */
    #loader { position: fixed; inset: 0; background: var(--black); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .spin { width: 36px; height: 36px; border: 3px solid rgba(255,107,0,0.2); border-top-color: var(--orange); border-radius: 50%; animation: sp 0.7s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }

    /* RECORDS OVERLAY */
    .records-overlay { position: fixed; inset: 0; z-index: 400; background: var(--black); display: none; flex-direction: column; overflow: hidden; }
    .records-overlay.open { display: flex; }
    .rec-hdr { flex-shrink: 0; height: 62px; padding: 0 18px; background: rgba(9,9,9,0.97); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(255,215,0,0.2); display: flex; align-items: center; justify-content: space-between; }
    .rec-hdr-title { font-size: 1.1rem; font-weight: 900; background: linear-gradient(135deg,#FFD700,#FF6B00); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .btn-close-rec { background: rgba(255,255,255,0.07); border: none; color: var(--muted); width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 1rem; }
    .rec-body { flex: 1; overflow-y: auto; padding: 20px 16px 40px; max-width: 700px; margin: 0 auto; width: 100%; }
    .rec-mode-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .rec-tab { padding: 8px 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: var(--muted); font-family:'Heebo',sans-serif; font-size:0.85rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
    .rec-tab.active { background: rgba(255,215,0,0.12); border-color: var(--gold); color: var(--gold); }
    .muscle-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .m-tab { padding: 5px 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); background: transparent; color: #555; font-family:'Heebo',sans-serif; font-size:0.75rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
    .m-tab.active { background: rgba(255,107,0,0.12); border-color: var(--orange); color: var(--orange); }
    .ex-select { width:100%; padding:12px 14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:10px; color:var(--white); font-family:'Heebo',sans-serif; font-size:0.95rem; outline:none; cursor:pointer; margin-bottom:20px; }
    .ex-select:focus { border-color: var(--orange); }
    .podium { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
    .podium-row { display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:14px; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.03); }
    .podium-row.rank-1 { border-color:rgba(255,215,0,0.45); background:rgba(255,215,0,0.06); }
    .podium-row.rank-2 { border-color:rgba(192,192,192,0.3); background:rgba(192,192,192,0.04); }
    .podium-row.rank-3 { border-color:rgba(205,127,50,0.3); background:rgba(205,127,50,0.04); }
    .podium-medal { font-size:1.6rem; flex-shrink:0; width:32px; text-align:center; }
    .podium-info { flex:1; min-width:0; }
    .podium-name { font-size:0.95rem; font-weight:900; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .podium-stats { font-size:0.78rem; color:var(--muted); }
    .podium-orm { font-size:0.9rem; font-weight:700; color:var(--gold); white-space:nowrap; }
    .my-rec-box { padding:13px 16px; border-radius:12px; border:1px solid rgba(255,107,0,0.2); background:rgba(255,107,0,0.05); font-size:0.85rem; color:var(--muted); margin-top:4px; }
    .my-rec-box strong { color:var(--orange); }
    .steps-row { display:flex; gap:10px; margin-bottom:24px; }
    .steps-input { flex:1; padding:12px 14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:10px; color:var(--white); font-family:'Heebo',sans-serif; font-size:0.95rem; outline:none; }
    .steps-input:focus { border-color: var(--orange); }
    .btn-save-steps { padding:12px 20px; background:var(--orange); border:none; border-radius:10px; color:#fff; font-family:'Heebo',sans-serif; font-size:0.9rem; font-weight:700; cursor:pointer; white-space:nowrap; }
    .no-records { text-align:center; padding:40px 20px; color:#444; font-size:0.9rem; }
  </style>
</head>
<body>

<div id="loader"><div class="spin"></div></div>

<div class="topnav">
  <div>
    <div class="topnav-brand">HF Admin</div>
    <div class="topnav-sub">פאנל ניהול לקוחות</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="btn-sm btn-outline" id="btn-ex-view" onclick="toggleExView()" style="border-color:rgba(255,215,0,0.35);color:#FFD700;">💪 תרגילים</button>
    <button class="btn-sm btn-outline" id="btn-rc-view" onclick="toggleRecipeView()" style="border-color:rgba(255,215,0,0.35);color:#FFD700;">🍳 מתכונים</button>
    <button class="btn-sm btn-outline" id="btn-fi-view" onclick="toggleFoodView()" style="border-color:rgba(74,222,128,0.35);color:#4ade80;">🥦 מזון</button>
    <button class="btn-sm btn-outline" onclick="openRecords()" style="border-color:rgba(255,215,0,0.35);color:#FFD700;">🏆 שיאים</button>
    <button class="btn-sm btn-outline" onclick="logout()">יציאה</button>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-title">לקוחות</span>
      <button class="btn-sm btn-orange" onclick="openAddModal()">+ הוסף</button>
    </div>
    <div class="client-list" id="client-list"></div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main-area">
    <div class="no-select">← בחר לקוח מהרשימה</div>
  </div>
</div>

<!-- ADD CLIENT MODAL -->
<div class="modal-bg" id="add-modal">
  <div class="modal">
    <h3>הוסף <span>לקוח חדש</span></h3>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="f-group"><label>שם מלא</label><input id="new-name" placeholder="ישראל ישראלי"/></div>
      <div class="f-group"><label>אימייל</label><input id="new-email" type="email" placeholder="client@email.com" style="direction:ltr;text-align:right;"/></div>
      <div class="form-grid">
        <div class="f-group"><label>תחילת ליווי</label><input id="new-start" type="date"/></div>
        <div class="f-group"><label>סיום ליווי</label><input id="new-end" type="date"/></div>
      </div>
      <div class="f-group">
        <label>סוג מסלול</label>
        <select id="new-plan">
          <option value="ליווי חודשי">ליווי חודשי</option>
          <option value="ליווי 3 חודשים">ליווי 3 חודשים</option>
          <option value="ליווי חצי שנה">ליווי חצי שנה</option>
        </select>
      </div>
    </div>
    <div id="add-err" style="margin-top:12px;font-size:0.82rem;color:#ff7070;display:none;"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" onclick="closeAddModal()">ביטול</button>
      <button class="btn-sm btn-orange" id="add-btn" onclick="addClient()">הוסף לקוח</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- RECORDS OVERLAY -->
<div class="records-overlay" id="records-overlay">
  <div class="rec-hdr">
    <div class="rec-hdr-title">🏆 שיאי נבחרת</div>
    <button class="btn-close-rec" onclick="closeRecords()">✕</button>
  </div>
  <div class="rec-body" id="rec-body"></div>
</div>

<!-- RECIPE MODAL -->
<div class="modal-bg" id="recipe-modal">
  <div class="modal" style="max-width:520px;">
    <h3><span id="recipe-modal-title">הוסף</span> <span>מתכון</span></h3>
    <div style="display:flex;flex-direction:column;gap:12px;max-height:60vh;overflow-y:auto;padding-left:4px;">
      <div class="f-group"><label>שם מתכון</label><input id="rc-name" placeholder="שייק חלבון ושוקולד"/></div>
      <div class="f-group">
        <label>קטגוריה</label>
        <select id="rc-cat">
          <option>ארוחת בוקר</option><option>ארוחת צהריים</option>
          <option>ארוחת ערב</option><option>חטיף</option>
          <option>שייק</option><option>כללי</option>
        </select>
      </div>
      <div class="form-grid">
        <div class="f-group"><label>זמן הכנה (דקות)</label><input id="rc-time" type="number" placeholder="10"/></div>
        <div class="f-group"><label>קלוריות</label><input id="rc-cal" type="number" placeholder="450"/></div>
      </div>
      <div class="form-grid">
        <div class="f-group"><label>חלבון (g)</label><input id="rc-prot" type="number" placeholder="35"/></div>
        <div class="f-group"><label>פחמימות (g)</label><input id="rc-carb" type="number" placeholder="40"/></div>
        <div class="f-group"><label>שומן (g)</label><input id="rc-fat" type="number" placeholder="12"/></div>
      </div>
      <div class="f-group">
        <label>מרכיבים (שורה לכל מרכיב)</label>
        <textarea id="rc-ingredients" rows="5" placeholder="200ml חלב&#10;1 מנה אבקת חלבון&#10;1 כפית קקאו" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-family:'Heebo',sans-serif;font-size:0.9rem;padding:12px 14px;resize:vertical;outline:none;transition:border-color 0.2s;" onfocus="this.style.borderColor='var(--orange)'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'"></textarea>
      </div>
      <div class="f-group">
        <label>הוראות הכנה</label>
        <textarea id="rc-instructions" rows="4" placeholder="שים הכל בבלנדר, ערבב 30 שניות..." style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-family:'Heebo',sans-serif;font-size:0.9rem;padding:12px 14px;resize:vertical;outline:none;transition:border-color 0.2s;" onfocus="this.style.borderColor='var(--orange)'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'"></textarea>
      </div>
    </div>
    <div id="rc-err" style="margin-top:12px;font-size:0.82rem;color:#ff7070;display:none;"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" onclick="closeRcModal()">ביטול</button>
      <button class="btn-sm btn-orange" id="rc-save-btn" onclick="saveRecipe()">שמור</button>
    </div>
  </div>
</div>

<!-- FOOD ITEM MODAL -->
<div class="modal-bg" id="fi-modal">
  <div class="modal" style="max-width:460px;">
    <h3><span id="fi-modal-title">הוסף</span> <span>מאכל</span></h3>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="f-group"><label>שם המאכל</label><input id="fi-name" placeholder="חזה עוף מבושל"/></div>
      <div style="font-size:0.75rem;color:var(--muted);margin-top:-6px;">ערכים לכל 100 גרם</div>
      <div class="form-grid">

    const specific = FOOD_UNITS_MAP[foodName] || [];
    if (!specific.length) return GENERIC_UNITS;

    const units = getUnitsForFood(item.food);

    const grams = (item._qty || 1) * unit.grams;

  /* ── NUTRITION EDITOR ── */
  function renderNutritionEditor() {
    const el = document.getElementById('nutrition-editor');
    if (!el) return;
    if (!nutritionPlan.length) { el.innerHTML = '<div style="color:#444;font-size:0.85rem;padding:8px 0;">אין ארוחות עדיין — לחץ + הוסף ארוחה</div>'; return; }
    el.innerHTML = nutritionPlan.map((meal, mi) => `
      <div class="meal-block">
        <div class="meal-block-head">
          <input value="${esc(meal.meal)}" oninput="nutritionPlan[${mi}].meal=this.value" placeholder="שם ארוחה (ארוחת בוקר)"/>
          <button class="btn-sm btn-red" onclick="removeMeal(${mi})">הסר ארוחה</button>
        </div>
        <div class="nutri-header">
          <span>מזון</span><span>כמות</span><span>קל׳</span><span>חלבון</span><span>פחמימה</span><span>שומן</span><span></span>
        </div>
        <div id="items-wrap-${mi}">
          ${(meal.items || []).map((item, ii) => itemRow(mi, ii, item)).join('')}
        </div>
        <button class="add-link" onclick="addItem(${mi})">+ הוסף מזון</button>
      </div>
    `).join('');
  }

  function itemRow(mi, ii, item) {
    const exp      = item._exp || false;
    const unitName = item._unit || 'גרם';
    const qty      = item._qty != null ? item._qty : (unitName === 'גרם' ? 100 : 1);
    const units    = getUnitsForFood(item.food);
    const selUnit  = units.find(u => u.name === unitName) || units[0];
    const totalG   = selUnit ? Math.round(qty * selUnit.grams * 10) / 10 : qty;

    const unitPicker = exp ? `
      <div style="background:rgba(255,107,0,0.06);border:1px solid rgba(255,107,0,0.2);border-radius:8px;padding:8px 12px;margin-top:4px;">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span style="font-size:0.8rem;color:var(--muted);flex-shrink:0;">מידה:</span>
          <select onchange="setItemUnit(${mi},${ii},this.value)"
            style="padding:5px 8px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);border-radius:6px;color:#fff;font-family:'Heebo',sans-serif;font-size:0.82rem;outline:none;cursor:pointer;max-width:200px;">
            ${units.map(u => `<option value="${esc(u.name)}" ${u.name===unitName?'selected':''}>${esc(u.name)}${u.grams!==1?' ('+u.grams+'g)':''}</option>`).join('')}
          </select>
          <span style="font-size:0.8rem;color:var(--muted);">×</span>
          <input type="number" min="0.1" step="0.1" value="${qty}"
            style="width:72px;padding:5px 8px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);border-radius:6px;color:#fff;font-family:'Heebo',sans-serif;font-size:0.82rem;text-align:center;outline:none;"
            oninput="setItemQty(${mi},${ii},+this.value)"/>
          <span style="font-size:0.82rem;color:var(--orange);font-weight:700;">= ${totalG}g</span>
        </div>
      </div>` : '';

    return `<div style="margin-bottom:6px;">
      <div class="item-row" id="item-${mi}-${ii}">
        <div style="display:flex;align-items:center;gap:3px;min-width:0;">
          <input value="${esc(item.food)}"
            oninput="nutritionPlan[${mi}].items[${ii}].food=this.value;showFoodSuggAdmin(this,${mi},${ii})"
            onblur="setTimeout(hideFoodSuggAdmin,160)"
            autocomplete="off" placeholder="מזון"
            style="flex:1;min-width:0;padding:6px 8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:#fff;font-family:'Heebo',sans-serif;font-size:0.8rem;outline:none;"/>
          <button onclick="toggleItemExpand(${mi},${ii})" title="בחר מידה"
            style="padding:3px 7px;background:${exp?'rgba(255,107,0,0.2)':'rgba(255,255,255,0.04)'};border:1px solid ${exp?'rgba(255,107,0,0.45)':'rgba(255,255,255,0.1)'};border-radius:5px;color:${exp?'var(--orange)':'#666'};cursor:pointer;font-size:0.65rem;flex-shrink:0;">${exp?'▲':'▼'}</button>
        </div>
        <input value="${esc(item.quantity)}" oninput="nutritionPlan[${mi}].items[${ii}].quantity=this.value" placeholder="כמות"/>
        <input value="${item.calories||''}" oninput="nutritionPlan[${mi}].items[${ii}].calories=+this.value" placeholder="קל׳" type="number"/>
        <input value="${item.protein||''}"  oninput="nutritionPlan[${mi}].items[${ii}].protein=+this.value"  placeholder="P"   type="number"/>
        <input value="${item.carbs||''}"    oninput="nutritionPlan[${mi}].items[${ii}].carbs=+this.value"    placeholder="C"   type="number"/>
        <input value="${item.fat||''}"      oninput="nutritionPlan[${mi}].items[${ii}].fat=+this.value"      placeholder="F"   type="number"/>
        <button class="btn-sm btn-red" onclick="removeItem(${mi},${ii})">✕</button>
      </div>
      ${unitPicker}
    </div>`;
  }

    await sb.from('clients').delete().eq('email', email);
    activeEmail = null;
    document.getElementById('main-area').innerHTML = '<div class="no-select">← בחר לקוח מהרשימה</div>';

  /* ── ADD CLIENT MODAL ── */
  function openAddModal() { document.getElementById('add-modal').classList.add('open'); }
  function closeAddModal() { document.getElementById('add-modal').classList.remove('open'); document.getElementById('add-err').style.display = 'none'; }

  async function addClient() {
    const name  = document.getElementById('new-name').value.trim();
    const email = document.getElementById('new-email').value.trim();
    const start = document.getElementById('new-start').value;
    const end   = document.getElementById('new-end').value;
    const plan  = document.getElementById('new-plan').value;
    const errEl = document.getElementById('add-err');
    const btn   = document.getElementById('add-btn');
    errEl.style.display = 'none';
    if (!name || !email || !start || !end) { errEl.textContent = 'יש למלא את כל השדות'; errEl.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'מוסיף...';

    // Insert client record — הלקוח מתחבר דרך Magic Link בלבד
    const { error: insErr } = await sb.from('clients').insert({ email, name, coaching_start: start, coaching_end: end, plan_type: plan });

    closeAddModal();
    await loadClients();

      return `

            <div>
              <div style="font-size:0.88rem;font-weight:700;">${dateStr}</div>

  /* ── EXERCISE LIBRARY (autocomplete) ── */
  async function loadExerciseLibrary() {

  function updateSubMuscles(selectedSub) {
    const muscle = document.getElementById('ex-muscle').value;
    const subs = MUSCLE_HIERARCHY[muscle] || [];
    const select = document.getElementById('ex-sub-muscle');
    select.innerHTML = `<option value="">— כללי —</option>` +
      subs.map(s => `<option value="${s}"${s === selectedSub ? ' selected' : ''}>${s}</option>`).join('');
  }

  function renderSecondaryPills(selected) {
    exSecondaryMuscles = [...(selected || [])];
    const wrap = document.getElementById('ex-secondary-wrap');
    if (!wrap) return;
    wrap.innerHTML = Object.keys(MUSCLE_HIERARCHY).map(m => {
      const active = exSecondaryMuscles.includes(m);
      return `<button type="button" class="muscle-pill${active ? ' muscle-active' : ''}" onclick="toggleSecondary('${m}',this)" style="font-size:0.72rem;padding:3px 9px;">${m}</button>`;
    }).join('');
  }

  function toggleSecondary(muscle, btn) {
    const idx = exSecondaryMuscles.indexOf(muscle);
    if (idx === -1) { exSecondaryMuscles.push(muscle); btn.classList.add('muscle-active'); }
    else { exSecondaryMuscles.splice(idx, 1); btn.classList.remove('muscle-active'); }
  }

  function showExSugg(input, di, ei) {
    hideExSugg();
    trainingPlan[di].exercises[ei].name = input.value;
    const q = input.value.trim().toLowerCase();
    if (!q) return;
    const matches = exerciseLibrary.filter(e => e.name.toLowerCase().includes(q)).slice(0, 8);
    if (!matches.length) return;

    const rect = input.getBoundingClientRect();
    const drop = document.createElement('div');
    drop.id = 'ex-sugg-drop';
    drop.style.cssText = `position:fixed;top:${rect.bottom + 2}px;right:${window.innerWidth - rect.right}px;
      width:${rect.width}px;background:#1e1e1e;border:1px solid rgba(255,107,0,0.4);
      border-radius:8px;z-index:500;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,0.6);`;

    matches.forEach(ex => {
      const item = document.createElement('div');
      item.style.cssText = 'padding:9px 12px;cursor:pointer;font-size:0.85rem;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center;';
      const label = ex.sub_muscle_group ? `${ex.muscle_group} › ${ex.sub_muscle_group}` : ex.muscle_group;
      item.innerHTML = `<span>${hlMatch(ex.name, q)}</span><span style="font-size:0.72rem;color:var(--muted);">${label}</span>`;
      item.onmousedown = () => {
        trainingPlan[di].exercises[ei].name = ex.name;
        input.value = ex.name;
        hideExSugg();
      };
      item.onmouseover = () => item.style.background = 'rgba(255,107,0,0.1)';
      item.onmouseout  = () => item.style.background = '';
      drop.appendChild(item);
    });

    document.body.appendChild(drop);
  }

  function hideExSugg() {
    const d = document.getElementById('ex-sugg-drop');
    if (d) d.remove();
  }

  function hlMatch(name, q) {
    const idx = name.toLowerCase().indexOf(q);
    if (idx === -1) return esc(name);
    return esc(name.slice(0, idx)) +
      `<span style="color:var(--orange);font-weight:700;">${esc(name.slice(idx, idx + q.length))}</span>` +
      esc(name.slice(idx + q.length));
  }

  document.addEventListener('click', e => {
    const drop = document.getElementById('ex-sugg-drop');
    if (drop && !drop.contains(e.target)) hideExSugg();
    const fdrop = document.getElementById('food-sugg-admin');
    if (fdrop && !fdrop.contains(e.target)) hideFoodSuggAdmin();
  });

  /* ── RECORDS ── */
  const RECORD_EXERCISES = {
    'חזה':        ['לחיצת חזה במשקולות','לחיצת חזה במוט חופשי','לחיצת חזה בסמית','לחיצת חזה בשיפוע חיובי במוט חופשי','לחיצת חזה בשיפוע חיובי בסמית','לחיצת חזה בשיפוע חיובי במשקולות'],
    'רגליים':     ['סקוואט חופשי','סקוואט בסמית','דדליפט קונבנציונלי','דדליפט רומני','היפ טראסט'],
    'גב':         ['פולי עליון לגב','חתירה במוט חופשי','חתירה בסמית'],
    'יד קדמית':   ['יד קדמית במוט','יד קדמית בדאמבלים'],
    'יד אחורית':  ['לחיצה צרה במוט','לחיצה צרה בסמית'],
    'כתפיים':     ['לחיצת כתפיים במוט חופשי','לחיצת כתפיים בסמית','לחיצת כתפיים בדאמבלים'],
  };
  const MEDALS = ['🥇','🥈','🥉'];

  let recMode     = 'strength';
  let recMuscle   = 'חזה';
  let recExercise = 'לחיצת חזה במוט חופשי';
  let recLogs     = null;
  let recClients  = {};
  let recSteps    = [];

  function calc1RM(w, r) {
    w = parseFloat(w); r = parseInt(r);
    if (!w || !r || r <= 0) return 0;
    return Math.round(w * (1 + r / 30) * 10) / 10;
  }

  async function openRecords() {
    document.getElementById('records-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    if (recLogs !== null) { renderRecBody(); return; }
    document.getElementById('rec-body').innerHTML = '<div style="text-align:center;padding:40px;color:#444;">טוען נתונים...</div>';
    const today = new Date().toISOString().split('T')[0];
    const [{ data: logs }, { data: cls }, { data: steps }] = await Promise.all([
      sb.from('workout_logs').select('client_email,log_date,exercises'),
      sb.from('clients').select('email,name'),
      sb.from('steps_logs').select('client_email,steps').eq('log_date', today)
    ]);
    recLogs  = logs || [];
    recSteps = steps || [];
    (cls || []).forEach(c => { recClients[c.email] = c.name || c.email.split('@')[0]; });
    renderRecBody();
  }

  function renderRecBody() {
    const body = document.getElementById('rec-body');
    const modeTabs = `
      <div class="rec-mode-tabs">
        <button class="rec-tab${recMode==='strength'?' active':''}" onclick="setRecMode('strength')">💪 שיאי כוח</button>
        <button class="rec-tab${recMode==='steps'?' active':''}" onclick="setRecMode('steps')">🚶 צעדים יומיים</button>
      </div>`;

    if (recMode === 'steps') {
      const today = new Date().toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});
      const myS   = recSteps.find(s => s.client_email === ADMIN);
      const top   = [...recSteps].sort((a,b) => b.steps - a.steps).slice(0,10);
      body.innerHTML = modeTabs + `
        <div style="font-size:0.8rem;color:var(--muted);margin-bottom:14px;">📅 היום — ${today}</div>
        <div class="steps-row">
          <input class="steps-input" type="number" id="steps-inp" min="0" placeholder="כמה צעדים עשית היום?"
            value="${myS ? myS.steps : ''}"/>
          <button class="btn-save-steps" onclick="logSteps()">שמור</button>
        </div>
        ${top.length ? `<div class="podium">${top.map((s,i)=>`
          <div class="podium-row${i<3?' rank-'+(i+1):''}">
            <div class="podium-medal">${i<3?MEDALS[i]:'#'+(i+1)}</div>
            <div class="podium-info"><div class="podium-name">${esc(recClients[s.client_email]||s.client_email.split('@')[0])}</div></div>
            <div class="podium-orm">${Number(s.steps).toLocaleString()} צעדים</div>
          </div>`).join('')}</div>`
        : '<div class="no-records">אף מתאמן לא רשם צעדים היום עדיין 🚶</div>'}
        ${myS ? `<div class="my-rec-box">👤 הצעדים שלי היום: <strong>${Number(myS.steps).toLocaleString()}</strong></div>` : ''}`;
      return;
    }

    const board = buildExBoard(recExercise);
    body.innerHTML = modeTabs + `
      <div class="muscle-tabs">
        ${Object.keys(RECORD_EXERCISES).map(m =>
          `<button class="m-tab${m===recMuscle?' active':''}" onclick="setRecMuscle('${m}')">${m}</button>`
        ).join('')}
      </div>
      <select class="ex-select" onchange="setRecEx(this.value)">
        ${(RECORD_EXERCISES[recMuscle]||[]).map(ex =>
          `<option value="${ex}"${ex===recExercise?' selected':''}>${ex}</option>`
        ).join('')}
      </select>
      ${board.length ? `<div class="podium">${board.map((e,i)=>`
        <div class="podium-row rank-${i+1}">
          <div class="podium-medal">${MEDALS[i]}</div>
          <div class="podium-info">
            <div class="podium-name">${esc(e.name)}</div>
            <div class="podium-stats">${e.weight} ק"ג × ${e.reps} חזרות · ${e.date}</div>
          </div>
          <div class="podium-orm">1RM: ${e.orm}</div>
        </div>`).join('')}</div>`
      : '<div class="no-records">אין תוצאות עדיין לתרגיל זה 💪</div>'}`;
  }

  function buildExBoard(exName) {
    const best = {};
    recLogs.forEach(log => {
      (log.exercises||[]).forEach(ex => {
        if (ex.name !== exName) return;
        (ex.sets||[]).forEach(set => {
          const orm = calc1RM(set.weight, set.reps);
          if (!orm) return;
          const cur = best[log.client_email];
          if (!cur || orm > cur.orm || (orm===cur.orm && parseFloat(set.weight)>cur.weight) || (orm===cur.orm && parseFloat(set.weight)===cur.weight && log.log_date>cur.date)) {
            best[log.client_email] = { name: recClients[log.client_email]||log.client_email.split('@')[0], weight: parseFloat(set.weight), reps: parseInt(set.reps), orm, date: log.log_date };
          }
        });
      });
    });
    return Object.values(best).sort((a,b)=>b.orm-a.orm||b.weight-a.weight||b.date.localeCompare(a.date)).slice(0,3);
  }

  function setRecMode(m)   { recMode=m; renderRecBody(); }
  function setRecMuscle(m) { recMuscle=m; recExercise=RECORD_EXERCISES[m][0]; renderRecBody(); }
  function setRecEx(ex)    { recExercise=ex; renderRecBody(); }

  async function logSteps() {
    const val = parseInt(document.getElementById('steps-inp').value);
    if (!val || val < 0) return;
    const today = new Date().toISOString().split('T')[0];
    const btn = document.querySelector('.btn-save-steps');
    btn.disabled = true; btn.textContent = 'שומר...';
    const { error } = await sb.from('steps_logs').upsert(
      { client_email: ADMIN, steps: val, log_date: today },
      { onConflict: 'client_email,log_date' }
    );
    btn.disabled = false; btn.textContent = 'שמור';
    if (error) { toast('שגיאה בשמירה', 'err'); return; }
    const idx = recSteps.findIndex(s => s.client_email === ADMIN);
    if (idx >= 0) recSteps[idx].steps = val; else recSteps.push({ client_email: ADMIN, steps: val });
    renderRecBody();
  }

  init();
</script>
</body>
</html>
