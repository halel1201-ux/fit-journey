<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0a0a0a"/>
  <!-- Outer orange glow ring -->
  <rect x="8" y="8" width="496" height="496" rx="74" fill="none" stroke="#FF6B00" stroke-width="6" opacity="0.6"/>
  <!-- Inner subtle ring -->
  <rect x="20" y="20" width="472" height="472" rx="64" fill="none" stroke="#FF8C00" stroke-width="2" opacity="0.3"/>
  <!-- Orange radial glow at bottom -->
  <radialGradient id="glow" cx="50%" cy="90%" r="60%">
    <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
  </radialGradient>
  <rect x="20" y="20" width="472" height="472" rx="64" fill="url(#glow)"/>
  <!-- "HF" text -->
  <text x="256" y="320" font-family="Arial Black, Impact, sans-serif" font-size="260" font-weight="900"
        fill="#FF6B00" text-anchor="middle" dominant-baseline="auto"
        style="letter-spacing:-8px">FJ</text>
  <!-- Small subtitle -->
  <text x="256" y="395" font-family="Arial, sans-serif" font-size="42" font-weight="400"
        fill="#AAAAAA" text-anchor="middle" letter-spacing="6">COACHING</text>
  <!-- Orange underline accent -->
  <rect x="140" y="408" width="232" height="4" rx="2" fill="#FF6B00" opacity="0.8"/>
</svg>
